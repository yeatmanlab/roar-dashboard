<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
</head>

<style>
  #stimulus-letter {
    height: 30%;
  }

  @media screen and (max-width: 1024px) {
    #stimulus-letter {
      height: 25%;
    }
  }
</style>

<body>
  <div class="container-fluid h-100">
    <div class="static-container"> 
      <div class="speech-bubble" role="status"></div>
      <img class="lion-char-instructions" src="https://storage.googleapis.com/roav-ran/shared/assets/pointingRightLionAge12.webp" alt="Lion character">
      <!--TODO: Add alt-->
      <img id="stimulus-letter">
      <!--TODO: Extract to constants-->
      <p class="next-text">Click the yellow button to continue.</p>
         <!-- Audio Playing -->  
      <audio autoplay id="voiceover"> </audio>
      <button class="next-button" aria-label="Continue"></button>
    </div>
  </div>
  <audio id="voiceover"></audio>
</body>

<script data-dynamic>

  var counter = 0;
  var userSpoke = false;
  var animFrameId = null;
  var micStream = null;
  var timeoutId = null;
  var feedbackRetryCount = 0;
  var maxFeedbackRetries = (window.instructionStage && window.instructionStage.maxFeedbackRetries) || 3;
  var instructionSignal = window.instructionAbortController
    ? window.instructionAbortController.signal
    : undefined;

  var nextButton = document.querySelector('.next-button');
  var nextText = document.querySelector('.next-text');
  nextButton.disabled = true;
  nextText.textContent = '';
  nextButton.addEventListener('click', function () {
    startNextView();
  }, { signal: instructionSignal });

  var voiceover = document.getElementById('voiceover');
  voiceover.addEventListener('ended', function () {
    setupMediaStream();
  }, { signal: instructionSignal });

  // Show first slide immediately
  startNextView();

  function startNextView() {
    
    counter++;

    if (timeoutId !== null) {
      clearTimeout(timeoutId);
      timeoutId = null;
    }
    if (animFrameId !== null) {
      cancelAnimationFrame(animFrameId);
      animFrameId = null;
    }
    if (micStream !== null) {
      micStream.getTracks().forEach(function (track) { track.stop(); });
      micStream = null;
    }
    var speechBubble = document.querySelector('.speech-bubble');
    var stimulusLetter = document.getElementById('stimulus-letter');
    var voiceover = document.getElementById('voiceover');

    if (window.instructionStage) {

      if (userSpoke && (counter === 2 || counter === 4)) counter += 1; // skip feedback if user spoke

      switch (counter) {
        case 1:
          userSpoke = false; // reset for next time
          nextButton.disabled = true;
          nextText.textContent = '';
          // Teaching slide: introduce the letter B
          speechBubble.innerHTML = window.instructionStage.letterB.header.text;
          stimulusLetter.src = 'https://storage.googleapis.com/roav-ran/shared/Letters/B.svg';
          voiceover.src = window.instructionStage.letterB.header.audioSrc;
          break;
        case 2:
          // "I can't hear you" retry for letter B
          feedbackRetryCount = 1;
          userSpoke = false;
          nextButton.disabled = true;
          nextText.textContent = '';
          speechBubble.innerHTML = window.instructionStage.feedback.header.text;
          stimulusLetter.src = 'https://storage.googleapis.com/roav-ran/shared/Letters/B.svg';
          voiceover.src = window.instructionStage.feedback.header.audioSrc;
          break;
        case 3:
          // Practice prompt: ask student to identify the letter D
          feedbackRetryCount = 0;
          userSpoke = false;
          nextButton.disabled = true;
          nextText.textContent = '';
          speechBubble.innerHTML = window.instructionStage.letterD.header.text;
          stimulusLetter.src = 'https://storage.googleapis.com/roav-ran/shared/Letters/D.svg';
          voiceover.src = window.instructionStage.letterD.header.audioSrc;
          break;
        case 4:
          // "I can't hear you" retry for letter D
          feedbackRetryCount = 1;
          userSpoke = false;
          nextButton.disabled = true;
          nextText.textContent = '';
          speechBubble.innerHTML = window.instructionStage.feedback.header.text;
          stimulusLetter.src = 'https://storage.googleapis.com/roav-ran/shared/Letters/D.svg';
          voiceover.src = window.instructionStage.feedback.header.audioSrc;
          break;
        default:
          counter = 0;
          pageCompleted();
          return;
      }
    }

    if (voiceover.src && voiceover.src !== window.location.href) {
      voiceover.play();
    }
  }

  async function setupMediaStream() {
    try {
      const audioContext = new AudioContext();
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

      const micSource = audioContext.createMediaStreamSource(micStream);
      const analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      micSource.connect(analyser);

      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);

      function detectAudio() {
        analyser.getByteTimeDomainData(dataArray);
        let sum = 0;
        for (let i = 0; i < bufferLength; i++) {
          sum += (dataArray[i] - 128) * (dataArray[i] - 128);
        }
        const rms = Math.sqrt(sum / bufferLength);
        // console.log('RMS:', rms);
        if (rms > 5.5) {
          // This is for testing audio thresholds
          // console.log('Audio detected with RMS:', rms);
          if (timeoutId !== null) {
            clearTimeout(timeoutId);
            timeoutId = null;
          }
          userSpoke = true;
          nextButton.disabled = false;
          nextText.textContent = 'Click the yellow button to continue.';
        }
        animFrameId = requestAnimationFrame(detectAudio);
      }

      animFrameId = requestAnimationFrame(detectAudio);
      timeoutId = setTimeout(function () {
        if (!userSpoke) {
          if ((counter === 2 || counter === 4) && feedbackRetryCount < maxFeedbackRetries) {
            feedbackRetryCount++;
            restartCurrentFeedbackSlide();
          } else if (counter === 2 || counter === 4) {
            pageFailedMic();
          } else {
            startNextView();
          }
        }
      }, 5000);
    } catch (err) {
      console.error('Microphone access failed:', err);
    }
  }

  function restartCurrentFeedbackSlide() {
    if (animFrameId !== null) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    if (micStream !== null) { micStream.getTracks().forEach(function (t) { t.stop(); }); micStream = null; }
    userSpoke = false;
    var vo = document.getElementById('voiceover');
    vo.currentTime = 0;
    vo.play();
  }

  function pageFailedMic() {
    if (timeoutId !== null) { clearTimeout(timeoutId); timeoutId = null; }
    if (animFrameId !== null) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    if (micStream !== null) { micStream.getTracks().forEach(function (t) { t.stop(); }); micStream = null; }
    document.dispatchEvent(new Event('instructionMicFailed'));
  }

  function pageCompleted() {
    if (timeoutId !== null) {
      clearTimeout(timeoutId);
      timeoutId = null;
    }
    if (animFrameId !== null) {
      cancelAnimationFrame(animFrameId);
      animFrameId = null;
    }
    if (micStream !== null) {
      micStream.getTracks().forEach(function (track) { track.stop(); });
      micStream = null;
    }
    document.dispatchEvent(new Event('pageComplete'));
  }

</script>
</html>
