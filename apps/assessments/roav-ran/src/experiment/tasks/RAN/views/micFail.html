<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <div class="container-fluid h-100">
    <div class="static-container">
      <!-- <h2 class="header--center"></h2> -->
      <div class="speech-bubble" role="status"></div>
      <img class="lion-char" src="https://storage.googleapis.com/roav-ran/shared/assets/sadLionAge12.webp" alt="Lion character">
      <p class="next-text"></p>
    </div>
    <button class="next-button" id="mic-fail-next-button" aria-label="Continue"></button>
  </div>
  <audio id="voiceover"></audio>
</body>

<script data-dynamic>
  var slide = window.micFailSlide || {};
  var micFailSignal = window.micFailAbortController
    ? window.micFailAbortController.signal
    : undefined;
  var voiceover = document.getElementById('voiceover');

  document.querySelector('.speech-bubble').innerHTML = (slide.header && slide.header.text) || '';
  document.querySelector('.next-text').textContent = (slide.footer && slide.footer.text) || '';

  document.querySelector('.next-button').addEventListener('click', function () {
    voiceover.pause();
    document.dispatchEvent(new Event('pageComplete'));
  }, { signal: micFailSignal });

  var headerSrc = slide.header && slide.header.audioSrc;
  var footerSrc = slide.footer && slide.footer.audioSrc;

  if (headerSrc) {
    voiceover.src = headerSrc;
    voiceover.addEventListener('ended', function () {
      if (footerSrc) {
        voiceover.src = footerSrc;
        voiceover.play().catch(function () {});
      }
    }, { once: true, signal: micFailSignal });
    voiceover.play().catch(function () {});
  } else if (footerSrc) {
    voiceover.src = footerSrc;
    voiceover.play().catch(function () {});
  }
</script>
</html>
