<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/onnxjs/dist/onnx.min.js"></script>
  </head>

  <style>
    body {
      margin: 0;
      min-height: 100vh; /* Ensure body takes the full viewport height */
      display: flex; /* Enable Flexbox */
      justify-content: center; /* Center content horizontally */
      align-items: center; /* Center content vertically */
      font-family: sans-serif;
    }


    .bubble {
      position: absolute;
      border-radius: 50%;
      animation: spin 2s linear infinite;
    }


    .piece {
      width: 10px;
      height: 10px;
      background-color: inherit;
      border-radius: 50%;
      position: absolute;
      transform: translate(-50%, -50%);
      opacity: 0;
    }

    @keyframes spin {
      0% {
      transform: rotate(0deg);
        }
      100% {
        transform: rotate(360deg); /* Constant speed */
      }
    }

    .spin {
  animation: spin 2s linear infinite;
    }

    stim {
      position: absolute;
      height: auto;
      cursor: pointer;
    }

    #instruction {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #confirmContainer {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #stimulus {
      position: absolute;
      /* animation: pulsate 1s infinite; */
      /* animation: spin 2s linear infinite; */
      width: 25px;
      height: 50px;
      background-color: #1e90ff;
      border-radius: 50%;
      display: block; /* Initially hidden */
      transform: translate(-50%, -50%);
      visibility: hidden;
    }

    #headCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #canvas-container {
      position: relative;
      width: 300px;
      height: 300px;
      top: 30px;
      margin: 0 auto;
    }

    @keyframes pulsate {
      0% {
        transform: scale(1) translate(-50%, -50%);
      }
      50% {
        transform: scale(1.2) translate(-50%, -50%);
      }
      100% {
        transform: scale(1) translate(-50%, -50%);
      }
    }

    @keyframes burst {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(0.5);
        opacity: 0;
      }
    }

  </style>

  <body>
    <!-- Center Instructions Panel -->
    <div id="calibrationContentArea">
      <div class="row gap-2" id="instruction">
      </div>
    </div> 

    <div id="stimulus" class="pulsating-disc"></div>
    <div id="canvas-container" style="display: none">
      <canvas
        id="headCanvas"
        class="frame"
        style="position: relative; display: none"
      ></canvas>
    </div>

    <!-- Confirm Button -->
    <div class="row gap-2" id="confirmContainer" style="display: none">
      <div class="card-body" style="text-align: center">
        <h3>Calibration complete!</h3>
        <button type="button" class="btn btn-primary" id="confirmButton">
          Continue
        </button>
      </div>
    </div>

    <div class="panel-block" style="display: block" ;>
      <video class="inputVideo" style="display: none"></video>
    </div>

    <audio autoplay id="voiceover"></audio>

    <script data-dynamic>

      // ----------- required -------------------
      function runAfterEveryFrame(output) {
        if (recordEyeMovements) {
          _gridCoordinates.push({
            x: parseFloat(stimulus.style.left),
            y: parseFloat(stimulus.style.top),
          });
          _eyeCoordinates.push({
            x: output.output.cpuData[0] * 100 - 50,
            y: output.output.cpuData[1] * 100,
          });
          _calibrationData.push(calibrationData);
          let time = new Date().getTime();
          _timeData.push(time);
        }
      }
      

      function pageCompleted() {
        continueProcessing = false;
        recordEyeMovements = false;
        const event = new Event("pageComplete");
        document.dispatchEvent(event);
      }

      var current_viewingDistance = 0;
      var recordEyeMovements = false;
      var calibrationData = 1;
      var continueProcessing = true;
      var deviceConfig = store.session.get("deviceConfig");
      var _gridCoordinates = [];
      var _parentDir = store.session.get("id");
      var _videoURL = "";

      var IMAGE_SIZE = 640;
      var upperbound_x = 96;
      var lowerbound_x = 2;
      var upperbound_y = 96;
      var lowerbound_y = 2;
      var stimulus = document.getElementById("stimulus");
      var x = 0;
      var y = 0;
      var counter = 0;
      var incX = 0.15 * 2;
      var incY = 0.02 * 2;
      var timeArray = [];
      var xArray = [];
      var yArray = [];
      var _eyeCoordinates = [];
      var _calibrationData = [];
      var _timeData = [];
      var fixationStimulus_x = [30, 50, 70];
      var fixationStimulus_y = [20, 40, 60];
      var _burstAudioBuffer = null;

      (function () {
        var ctx = window._getAudioContext ? window._getAudioContext() : null;
        if (!ctx) return;
        fetch('https://eyetrackingdata.blob.core.windows.net/public/Audios/feedbackCorrect.mp3')
          .then(function (r) { return r.arrayBuffer(); })
          .then(function (buf) { return ctx.decodeAudioData(buf); })
          .then(function (decoded) { _burstAudioBuffer = decoded; })
          .catch(function () {});
      }());

      async function startTest() {
        // Wait for video to be ready
        await new Promise((resolve) => setTimeout(resolve, 500)); // 0.5 second
        await runInference();
        openFullscreen();
        stimulus.classList.add('spin')
        updateCountdown(initStimulus);
      }

      async function initStimulus() {
        document.getElementById("stimulus").style.display = "block";
        await startRecording();
        recordEyeMovements = true;
        stimulus.style.visibility = 'visible';
        moveStimulus();
      }


      // Function to create the burst effect
      function createBurstEffect(x,y,size=50) {
        const numPieces = 8; // Number of pieces
        var _actx = window._getAudioContext ? window._getAudioContext() : null;
        if (_actx && _actx.state === 'running' && _burstAudioBuffer) {
          var _src = _actx.createBufferSource();
          _src.buffer = _burstAudioBuffer;
          _src.connect(_actx.destination);
          _src.start(0);
        }
        for (let i = 0; i < numPieces; i++) {
          const piece = document.createElement('div');
          piece.style.position = 'absolute';
          piece.style.transform = 'translate(-50%, -50%)';
          piece.classList.add('piece');
          piece.style.backgroundColor = '#1e90ff';
          piece.style.left = `${x + size / 2 - 5}px`;
          piece.style.top = `${y + size / 4 - 5}px`;

          // Random direction for each piece
          const angle = (i / numPieces) * Math.PI * 2;
          const dx = Math.cos(angle) * size + 'px';
          const dy = Math.sin(angle) * size + 'px';

          // Set custom properties for animation
          piece.style.setProperty('--dx', dx);
          piece.style.setProperty('--dy', dy);
          piece.style.animation = `burst 0.8s ease-out forwards`;
          document.body.appendChild(piece);
          // Remove the piece after animation ends
          // Hide the element
          stimulus.style.visibility = 'hidden';
          setTimeout(() => piece.remove(), 800);

        }
          // Show the element again after 200ms
          setTimeout(() => {
            stimulus.style.visibility = 'visible';
            stimulus.classList.add('spin')
            // setTimeout(() => {
            //   stimulus.classList.add('spin'); // Add the spin class after 500ms
            // }, 200);
          }, 800); // 200ms delayue)

          
        // Remove the bubble after bursting
      }

      // Define the locations with repetition to cover 3 seconds at 10ms intervals
      var locations = [
        { x: 25, y: 25 }, // Location 1 (25,25)
        { x: 75, y: 25 }, // Location 2 (25,25)
        { x: 25, y: 65 }, // Location 3 (25,25)
        { x: 75, y: 65 }, // Location 4 (25,25)
        // { x: 50, y: 50 }, // Location 5 (25,50)
      ];

      // Create an array that repeats each location enough times to cover 3 seconds at 10ms intervals
      var sequence = [];
      locations.forEach((loc) => {
        for (let i = 0; i < 6; i++) { // 6 iterations for 3 seconds at 500ms intervals
          sequence.push(loc);
        }
      });

  async function moveStimulus() {
    if (counter < (sequence.length-1)) {
      let point = document.getElementById("point");
      stimulus.style.left = `${sequence[counter].x}%`; // Adjust for half of the cell width
      stimulus.style.top = `${sequence[counter].y}%`; // Adjust for half of the cell height
      
      counter += 1;
      // Toggle recording of eye movements
      if (counter % 6 <= 1) { // First 500ms
        if (counter>2 & counter % 6 == 0){
        var leftInPixels = (sequence[counter-1].x / 100) * document.body.offsetWidth;;
        var topInPixels = (sequence[counter-1].y / 100) * document.body.offsetHeight;;
        if (stimulus.classList.contains('spin')) {
          stimulus.classList.remove('spin');
        }
        createBurstEffect(leftInPixels-12.5,topInPixels+12.5)
        }
        recordEyeMovements = false;
      } else {
        recordEyeMovements = true;
      }
      // console.log('counter',counter,counter%6,recordEyeMovements,stimulus.style.left ,`${sequence[counter].x}%`)

      setTimeout(moveStimulus, 500); // Call this function every 500ms
    } else {
      calibrationData = 0;
      window._resumeAudioContext?.();
      await stopRecording();
      continueProcessing = false;
      recordEyeMovements = false;
      var leftInPixels = (sequence[counter-1].x / 100) * document.body.offsetWidth;;
      var topInPixels = (sequence[counter-1].y / 100) * document.body.offsetHeight;;
      createBurstEffect(leftInPixels-12.5,topInPixels+12.5)
      setTimeout(() => pageCompleted(), 500); // Proper callback structure
    }
  }

      async function fixationStimulus() {
        for (let x of fixationStimulus_x) {
          for (let y of fixationStimulus_y) {
            let time = new Date().getTime();
            timeArray.push(time);
            xArray.push(x);
            yArray.push(y);

            stimulus.style.left = `${x}%`; // Adjust for half of the cell width
            stimulus.style.top = `${y}%`; // Adjust for half of the cell height

            // Wait for 4 seconds before moving to the next position
            await new Promise((resolve) => setTimeout(resolve, 4000));
          }
        }

        window._resumeAudioContext?.();
        await stopRecording();
        pageCompleted();
      }
    </script>
  </body>
