<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.min.js"></script>

<script data-dynamic>
  var irisMetrics;
  var headMetrics;
  var headCoordinates;
  var leftEyeCoordinates = [];
  var rightEyeCoordinates = [];
  var movingContour;
  var fixedContour;
  var canvasContour;
  var focalLengthMultiple;
  var headMetrics_array = [];
  var irisMetrics_array = [];
  var mediaRecorder;
  var mediaChunks = [];
  var leftEyectx;
  var rightEyectx;
  var normalizedFocalLength;
  var blueCircle;
  var inferenceRetries = 0;
  var maxInferenceRetries = 100;

  var inputVideo = document.getElementsByClassName("inputVideo")[0];
  var headCanvas = document.getElementById("headCanvas");
  var headCtx = headCanvas.getContext("2d");

  var faceMesh = new FaceMesh({
    locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${file}`;
    },
  });

  faceMesh.setOptions({
    selfieMode: true,
    enableFaceGeometry: false,
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });

  faceMesh.onResults(onResultsFaceMesh);

  async function runInference() {
    await faceMesh.send({ image: inputVideo });
    try {
      if (!leftEyeCoordinates || leftEyeCoordinates.length === 0 || !rightEyeCoordinates || rightEyeCoordinates.length === 0) {
        inferenceRetries++;
        if (inferenceRetries > maxInferenceRetries) {
          console.warn("Max inference retries reached. Stopping eye tracking.");
          continueProcessing = false;
          return;
        }
        throw new Error("No face detected");
      }
      inferenceRetries = 0;
      let input1, input2, kpsTensor;
      let [upper_left_x, upper_left_y, width, height] = convertToYolo(
        leftEyeCoordinates,
        inputVideo.videoWidth,
        inputVideo.videoHeight,
      );
      let kps = [
        upper_left_x / inputVideo.videoWidth,
        upper_left_y / inputVideo.videoHeight,
        width / inputVideo.videoWidth,
        height / inputVideo.videoHeight,
      ];

      leftEyectx.drawImage(
        inputVideo,
        Math.max(0, inputVideo.videoWidth - upper_left_x - width),
        Math.max(0, upper_left_y),
        Math.max(0, width),
        Math.max(0, height),
        0,
        0,
        128,
        128,
      );

      [upper_left_x, upper_left_y, width, height] = convertToYolo(
        rightEyeCoordinates,
        inputVideo.videoWidth,
        inputVideo.videoHeight,
      );
      kps.push(
        upper_left_x / inputVideo.videoWidth,
        upper_left_y / inputVideo.videoHeight,
        width / inputVideo.videoWidth,
        height / inputVideo.videoHeight,
      );
      rightEyectx.drawImage(
        inputVideo,
        Math.max(0, inputVideo.videoWidth - upper_left_x - width),
        Math.max(0, upper_left_y),
        Math.max(0, width),
        Math.max(0, height),
        0,
        0,
        128,
        128,
      );

      imageData = leftEyectx.getImageData(0, 0, 128, 128);
      let preprocessedData = preprocess(imageData.data, 128, 128);
      input1 = new Tensor(preprocessedData, "float32", [1, 3, 128, 128]);
      imageData = rightEyectx.getImageData(0, 0, 128, 128);
      preprocessedData = preprocess(imageData.data, 128, 128);
      input2 = new Tensor(preprocessedData, "float32", [1, 3, 128, 128]);
      preprocessedData = preprocess_kps(kps);
      kpsTensor = new Tensor(preprocessedData, "float32", [1, 8]);

      myWorker.postMessage({
        input1: input1,
        input2: input2,
        kpsTensor: kpsTensor,
      });
    } catch (error) {
      console.log(error)
      if (inferenceRetries < maxInferenceRetries) {
        setTimeout(runInference, 50);
      } else {
        console.warn("Max inference retries reached. Stopping eye tracking.");
        continueProcessing = false;
      }
    }
  }

  myWorker.onmessage = async (e) => {
    if (e.data.error) {
      console.error("Error from worker:", e.data.error);
    } else {
      if (typeof runAfterEveryFrame === 'function') {
        runAfterEveryFrame((output = e.data));
      }
    }

    if (continueProcessing) {
      runInference();
    }
  };
</script>
