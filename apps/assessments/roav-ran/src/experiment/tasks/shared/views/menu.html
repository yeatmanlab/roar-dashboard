      <p class="lead mt-3 mb-5"></p>

<script data-dynamic>

document.body.addEventListener('click', function() {
  voiceover.pause();
  voiceover.currentTime = 0;; // Stop the voiceover whenever a click is detected          
});

(function() {
  // var jsonUrl = 'https://eyetrackingdata.blob.core.windows.net/public/config/tests.json';

    // fetch(tests_url)
    //   .then(response => response.json())
    //   .then(data => {
          // Extract test names from the JSON data
          window.menuData = tests_url;
          const testNames = Object.keys(window.menuData);
          // Create buttons dynamically based on test names
          const menuButtonsContainer = document.getElementById('menuButtons');
          const clickedTests = store.session.get('clickedTests') || [];
          testNames.forEach(testName => {

              const button = document.createElement('button');
              button.type = 'button';
              button.id = `button_${testName}`; 
              button.className = 'btn btn-primary';
              button.textContent = testName;

              if (clickedTests.includes(testName)) {
                  button.classList.add('btn-secondary'); // Grayish color
                  button.disabled = true
              }

              button.addEventListener('click', () => {
                 console.log(`CLICKED ${testName}`)
                  // Set the selected testType
                  store.session.set('testConfig', window.menuData[testName]);
  
                  // Highlight the clicked button and remove highlighting from others
                  const buttons = menuButtonsContainer.getElementsByTagName('button');
                  for (const otherButton of buttons) {
                      otherButton.classList.remove('btn-success');
                  }

                  button.classList.add('btn-success');
                  // Store the clicked test name in the array
                  store.session.set('clickedTests', clickedTests);

              });
              menuButtonsContainer.appendChild(button);
          });

          if ((clickedTests.length+1) >= document.querySelectorAll('button').length){
            console.log((clickedTests.length+1),document.querySelectorAll('button').length)
            store.session.set('testComplete',true)
          }

          // var buttons = document.querySelectorAll('[id^="button"]');
          const buttons = Array.from(document.querySelectorAll('[id^="button"]')); // Convert NodeList to an array
          const enabledButtons = buttons.filter(button => !button.disabled);
          // Check if there are any enabled buttons
          if (enabledButtons.length > 0) {
            // Randomly select one button
            const firstButton = enabledButtons[0];
            // Click the randomly selected button after a delay to ensure event listeners are registered
            // Can remove this if we go back to URL based approach
            // Might also refactor to remove this menuView entirely
            setTimeout(() => {
            firstButton.click();
            }, 10);
          } else {
            console.log("No enabled buttons available to click.");
          }

      // })
      // .catch(error => console.error('Error fetching JSON:', error));
})();

</script>
