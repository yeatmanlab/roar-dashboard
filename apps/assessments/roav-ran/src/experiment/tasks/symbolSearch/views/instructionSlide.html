<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symbol Search Trial</title>
</head>

 <style>
    body {
        margin: 0;
        height: 100%;
        width: 100%;
        cursor: auto;
        overflow: hidden;
        text-align: center;
        font-family: "Source Sans Pro", Gotham, "Helvetica Neue", Helvetica, Arial,
            "sans-serif";
    }

    /* main content area below the progress bar */
    .content-wrapper {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .image-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: calc(var(--u) * 1);
        max-width: calc(var(--u) * 100);
        padding: 0 calc(var(--u) * 1);
    }

    .image-row img {
        display: block;
        -webkit-user-drag: none;
        user-select: none;
        -webkit-user-select: none;
    }

    .image-row .target-image {
        width: calc(var(--u) * 8);
        height: calc(var(--u) * 8);
        object-fit: contain;
        padding: calc(var(--u) * 1);
        margin-right: calc(var(--u) * 5);
    }

    .image-row button {
        border: none;
        padding: 0;
        background: transparent;
        cursor: pointer;
    }

    .image-row button img {
        width: calc(var(--u) * 8);
        height: calc(var(--u) * 8);
        object-fit: contain;
        border: calc(var(--u) * 0.2) solid black;
        padding: calc(var(--u) * 1);
        transition: transform 0.2s ease;
    }

    @media (hover: hover) {
        .image-row button:hover img {
            box-shadow:
                0 0 calc(var(--u) * 1) gray,
                0 0 calc(var(--u) * 2) gray;
        }
    }

    .image-row button.pressed img {
        transform: scale(1.05);
        box-shadow:
            0 0 calc(var(--u) * 1) gray,
            0 0 calc(var(--u) * 2) gray;
    }
    
    .hidden-choice {
        visibility: hidden;
    }

    .glowingButton {
        opacity: 1;
        animation: glowing 1300ms infinite;
    }

    .glowingButton.disabled {
        cursor: none;
        pointer-events: none;
    }

    @keyframes glowing {
        0% { 
            outline: calc(var(--u) * 0.5) solid #2ba805;
            box-shadow: 0 0 calc(var(--u) * 0.5) #2ba805;
        }
        50% {
            outline: calc(var(--u) * 0.5) solid #49e819;
            box-shadow: 0 0 calc(var(--u) * 2) #49e819;
        }
        100% {
            outline: calc(var(--u) * 0.5) solid #2ba805;
            box-shadow: 0 0 calc(var(--u) * 0.5) #2ba805;
        }
    }

    .instruction-text {
        font-size: 3.5vh;
        line-height: 1.5;
        max-width: 80%;
        margin-bottom: 10vh;
    }

    .instruction-text-below {
        font-size: 3.5vh;
        line-height: 1.5;
        max-width: 80%;
        margin-top: 10vh;
    }

    .instruction-text-below.hidden {
        visibility: hidden;
    }


</style>

<body>
    <div class="content-wrapper">
        <p class="instruction-text"></p>
        <div class="image-row"></div>
        <p class="instruction-text-below hidden" id="text-below"></p>
        
    </div>
</body>

<script data-dynamic>
 
</script>
</html>
