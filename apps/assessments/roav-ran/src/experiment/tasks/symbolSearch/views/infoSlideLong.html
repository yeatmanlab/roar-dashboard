<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<style>

  body {
    margin: 0;
    height: 100%;
    width: 100%;
    cursor: auto;
    overflow: hidden;
    text-align: center;
    font-family: "Source Sans Pro", Gotham, "Helvetica Neue", Helvetica, Arial,
        "sans-serif";
  }

  .content-wrapper {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;   /* centers vertically */
    align-items: center;       /* centers horizontally */
    text-align: center;
  }

  /* Control relative heights */
  .header-text {
    font-size: 4vh;
    font-weight: 700;
    text-align: center;
    line-height: 1.5;
    color: #111;
    max-width: 80%;
    margin-bottom: 5vh;

  }

  .instruction-text {
    font-size: 3.5vh;
    line-height: 1.5;
    max-width: 80%;
  }

  .instruction-text-below {
    font-size: 3.5vh;
    line-height: 1.5;
    max-width: 80%;
    margin-top: 5vh;

  }

  .lion-relative {
    height: 30vh;
    width: auto;
    object-fit: contain;
  }

  .content-wrapper.large-layout .header-text {
    font-size: clamp(2rem, 4vw, 3rem);
  }

  .content-wrapper.large-layout .lion-relative {
    height: 40vh;
  }

</style>

<body>
    <div class="content-wrapper">
      <h2 class="header-text"></h2>
      <p class="instruction-text" id="textAbove"></p>
      <img class="lion-relative" src="https://storage.googleapis.com/roav-ran/shared/assets/pointingLeftLionAge12.webp" alt="Lion character">
      <p class="instruction-text-below" id="textBelow"></p>
    </div>
    <button class="next-button" id="info-next-button" aria-label="Continue"></button>
</body>

<script data-dynamic>
  
</script>
</html>
