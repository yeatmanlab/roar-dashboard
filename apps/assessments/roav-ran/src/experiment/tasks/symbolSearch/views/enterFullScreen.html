<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Full Screen</title>
</head>

 <style>
    body {
        margin: 0;
        height: 100%;
        width: 100%;
        cursor: auto;
        overflow: hidden;
        text-align: center;
        font-family: "Source Sans Pro", Gotham, "Helvetica Neue", Helvetica, Arial,
            "sans-serif";
    }

    /* main content area below the progress bar */
    .content-wrapper {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    #fullScreen {
        width: 80vw;
        text-align: center;
        color: rgba(76, 101, 139, 1);
        font-size: 1.7rem;
    }

    #header-text {
        text-align: center;
        font-style: normal;
        font-weight: regular;
        font-size: 5vh;
        color: rgba(76, 101, 139, 1);
    }

    #go-btn {
        width: 17vw;
        height: 10vh;
        background-color: rgba(76, 101, 139, 1);
        color: white;
        border-radius: 1rem;
        border: 0rem;
        font-size: 3vw;
        font-weight: bold;
        cursor: pointer;
        display: inline-block;
        margin: 1vh;
        line-height: 1.4;
        text-align: center;
        white-space: nowrap;
        background-image: none;
    }

    /* jsPsych progress bar */
    #jspsych-progressbar-container {
        color: #555;
        border-bottom: 1px solid #dedede;
        background-color: #f9f9f9;
        text-align: center;
        padding: 8px 0px;
        width: 100%;
        line-height: 1em;
        /*position: sticky;
        top: 0;
        z-index: 1000;*/
    }
    #jspsych-progressbar-container span {
        font-size: 14px;
        padding-right: 14px;
    }
    #jspsych-progressbar-outer {
        background-color: #eee;
        width: 50%;
        margin: auto;
        height: 14px;
        display: inline-block;
        vertical-align: middle;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1);
    }
    #jspsych-progressbar-inner {
        background-color: #aaa;
        width: 0%;
        height: 100%;
    }
</style>

<body>
    <!-- Progress bar (jsPsych-like) -->
    <div id="jspsych-progressbar-container" style="visibility: hidden;">
        <span id="progress-bar-text"></span>
        <div id="jspsych-progressbar-outer">
        <div id="jspsych-progressbar-inner"></div>
        </div>
    </div>

    <div class="content-wrapper">
        <div id="fullScreen">
            <h1 id="header-text"></h1>
        </div>
        <button id="go-btn"></button>
    </div>
</body>



<script data-dynamic>

</script>
</html>
