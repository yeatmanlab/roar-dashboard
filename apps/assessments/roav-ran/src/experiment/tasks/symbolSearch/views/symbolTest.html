<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symbol Search Trial</title>
</head>

 <style>
    body {
        margin: 0;
        height: 100%;
        width: 100%;
        cursor: auto;
        overflow: hidden;
        text-align: center;
        font-family: "Source Sans Pro", Gotham, "Helvetica Neue", Helvetica, Arial,
            "sans-serif";
    }

    /* main content area below the progress bar */
    .content-wrapper {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    } 

    .image-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: calc(var(--u) * 1);
        max-width: calc(var(--u) * 100);
        padding: 0 calc(var(--u) * 1);
    }

    .image-row img {
        display: block;
        -webkit-user-drag: none;
        user-select: none;
        -webkit-user-select: none;
    }

    .image-row .target-image {
        width: calc(var(--u) * 8);
        height: calc(var(--u) * 8);
        object-fit: contain;
        padding: calc(var(--u) * 1);
        margin-right: calc(var(--u) * 5);
    }

    .image-row button {
        border: none;
        padding: 0;
        background: transparent;
        cursor: pointer;
    }

    .image-row button img {
        width: calc(var(--u) * 8);
        height: calc(var(--u) * 8);
        object-fit: contain;
        border: calc(var(--u) * 0.2) solid black;
        padding: calc(var(--u) * 1);
        transition: transform 0.2s ease;
    }

    @media (hover: hover) {
        .image-row button:hover img {
            box-shadow:
                0 0 calc(var(--u) * 1) gray,
                0 0 calc(var(--u) * 2) gray;
        }
    }

    .image-row button.pressed img {
        transform: scale(1.05);
        box-shadow:
            0 0 calc(var(--u) * 1) gray,
            0 0 calc(var(--u) * 2) gray;
    }

    .hidden-choice {
        visibility: hidden;
    }

    /* jsPsych progress bar */
    #jspsych-progressbar-container {
        color: #555;
        border-bottom: 1px solid #dedede;
        background-color: #f9f9f9;
        text-align: center;
        padding: 8px 0px;
        width: 100%;
        line-height: 1em;
        /*position: sticky;
        top: 0;
        z-index: 1000;*/
    }
    #jspsych-progressbar-container span {
        font-size: 14px;
        padding-right: 14px;
    }
    #jspsych-progressbar-outer {
        background-color: #eee;
        width: 50%;
        margin: auto;
        height: 14px;
        display: inline-block;
        vertical-align: middle;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1);
    }
    #jspsych-progressbar-inner {
        background-color: #aaa;
        width: 0%;
        height: 100%;
    }
</style>

<body>
    <!-- Progress bar (jsPsych-like) -->
    <div id="jspsych-progressbar-container" style="visibility: visible;">
        <span id="progress-bar-text"></span>
        <div id="jspsych-progressbar-outer">
        <div id="jspsych-progressbar-inner"></div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="image-row"></div>
    </div>
</body>



<script data-dynamic>

</script>
</html>
