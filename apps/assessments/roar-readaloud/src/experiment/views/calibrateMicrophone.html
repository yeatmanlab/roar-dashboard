<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #ffffff; /* White background */
        color: #000000; /* Black text */
      }

      .loading-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
        border-radius: 10px;
        background: rgba(
          0,
          0,
          0,
          0.05
        ); /* Slight gray tint to differentiate from the white background */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Soft shadow for depth */
      }

      .loading-spinner {
        border: 8px solid rgba(0, 0, 0, 0.1); /* Lighter border for the spinner */
        border-top: 8px solid #0d6efd; /* Blue color for active part of the spinner */
        border-radius: 50%;
        width: 80px;
        height: 80px;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      h2 {
        font-weight: 400;
        letter-spacing: 1px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <h2>Please be quiet while we set up your microphone!</h2>
    </div>
  </body>
</html>
