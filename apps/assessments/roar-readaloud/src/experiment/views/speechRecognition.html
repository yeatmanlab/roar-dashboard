<body id="body">
  <div class="px-4 py-5 my-5 text-center" style="display: block">
    <h1 class="display-5 fw-bold" id="title">Transcribe</h1>
    <div class="col-lg-6 mx-auto">
      <p class="lead mt-3 mb-5"></p>
      <h3>Record to Transcribe</h3>
      <textarea
        id="transcriptionOutput"
        style="height: 300px; width: 80%"
        ,
        placeholder="Transcription will appear here..."
      ></textarea>

      <h3>Sample Audio</h3>
      <audio
        id="sampleAudio"
        controls
        src="https://eyetrackingdata.blob.core.windows.net/public/numbers.wav"
      >
        Your browser does not support the audio element.
      </audio>

      <div class="row gap-2" style="margin-top: 5%">
        <button id="recordButton_URL" onclick="transcribeURL()">
          Use Sample
        </button>
      </div>
      <div class="row gap-2" style="margin-top: 5%">
        <button id="recordButton">Record/Stop</button>
      </div>

      <!-- <div class="row gap-2" id="confirmButtons">
          <button id="confirmButton">Next</button>
        </div> -->
    </div>
  </div>

<script type="module">
  import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.4.0";
  let transcriber;

  async function initTranscriber() {
    transcriber = await pipeline(
      "automatic-speech-recognition",
      "Xenova/whisper-tiny.en",
      {
        revision: "output_attentions",
      },
    );
    window.transcriber = transcriber;
  }

  initTranscriber(); // Initialize the transcriber when the page loads
</script>

<script>
  let mediaRecorder;
  let audioChunks = [];

  async function startRecording() {
    if (!navigator.mediaDevices) {
      alert("Recording is not supported in this browser.");
      return;
    }

    audioChunks = []; // Reset previously recorded chunks
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = (event) => {
      audioChunks.push(event.data);
    };

    mediaRecorder.onstop = async () => {
      const audioBlob = new Blob(audioChunks, { type: "audio/wav" });
      // Here you would handle the transcription of the audioBlob
      // For demonstration, we'll log it to the console
      console.log("Audio recorded. Blob:", audioBlob);

      // Assuming transcriber can handle Blob objects or you have a mechanism to upload
      // the blob to a server and get a transcription back
      // let url = 'https://huggingface.co/datasets/Xenova/transformers.js-docs/resolve/main/jfk.wav';
      try {
        const audioBuffer = await blobToAudioBuffer(audioBlob);
        // Here, you need to convert the AudioBuffer to the expected Float32Array or Float64Array format
        // This step depends on how your transcriber function expects the audio data
        // Assuming it needs a Float32Array from the first channel for example:
        const float32Array = audioBuffer.getChannelData(0);

        // Now, you can pass the Float32Array to your transcriber
        let output = await window.transcriber(float32Array, {
          return_timestamps: "word",
        }); // Adjust this call based on the actual API
        document.getElementById("transcriptionOutput").value = output.text;
        console.log(output);
      } catch (error) {
        console.error("Error processing audio:", error);
      }
    };

    mediaRecorder.start();
    console.log("Recording started");
  }

  async function blobToAudioBuffer(blob) {
    return new Promise((resolve, reject) => {
      // Create a new FileReader to read the Blob
      const reader = new FileReader();
      reader.onloadend = () => {
        // Once read, convert the result to an ArrayBuffer
        const arrayBuffer = reader.result;

        // Use AudioContext to decode the audio data
        const audioContext = new (window.AudioContext ||
          window.webkitAudioContext)();
        audioContext.decodeAudioData(
          arrayBuffer,
          (audioBuffer) => {
            // Decode successful, resolve the promise with the AudioBuffer
            resolve(audioBuffer);
          },
          (e) => {
            // Error occurred during decoding
            reject(e);
          },
        );
      };
      // Read the blob as an array buffer
      reader.readAsArrayBuffer(blob);
    });
  }

  function stopRecording() {
    if (mediaRecorder) {
      mediaRecorder.stop();
      console.log("Recording stopped");
    }
  }

  document.getElementById("recordButton").addEventListener("click", () => {
    console.log("clicked");
    if (mediaRecorder && mediaRecorder.state === "recording") {
      stopRecording();
    } else {
      startRecording();
    }
  });

  async function transcribeURL() {
    let url =
      "https://eyetrackingdata.blob.core.windows.net/public/numbers.wav";
    let output = await window.transcriber(url, { return_timestamps: "word" });
    document.getElementById("transcriptionOutput").value = output.text;
    console.log(output);
  }
</script>
