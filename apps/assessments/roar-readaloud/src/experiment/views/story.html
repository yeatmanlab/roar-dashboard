<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<style>
        
    body {
        margin: 0;
        min-height: 100vh;  /* Ensure body takes the full viewport height */
        display: flex;      /* Enable Flexbox */
        justify-content: center;  /* Center content horizontally */
        align-items: center;      /* Center content vertically */
        font-family: sans-serif;
        overflow: hidden;
    }

    .character {
      position: absolute;
      top: 65%;
      left: 70%;
      margin-right: -50%;
      transform: translate(-50%, -50%);
      width: 45%;
    }

    .speechBubble {
      border-style: solid;
      border-width: 5px;
      border-color: rgb(255, 232, 128);
      border-radius: 10px;
      text-align: center;
      padding: 5vh;
      background-color: rgb(253 246 234);
    }

    stim {
      position: absolute;
      height: auto;
      cursor: pointer;
    }

    #instruction {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    #confirmContainer {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
  </style>


<body>

    <!-- Center Instructions Panel -->
      <div id="storyContentArea">
        <img id="bg" style="object-fit: contain; position: relative;">
        <img id="char" class="character">
        <div style="position: absolute; top: 40%; right: 50%;">
          <h4 class="speechBubble" id="text"> </h4>
        </div>
      </div>

    <!-- Audio Playing -->  
      <audio id="voiceover"> </audio>
    
  </body>

<script data-dynamic>

      startNextView(); // Call startNextView function whenever a click is detected          
  });

  document.getElementById('voiceover').addEventListener('ended', function() {
