      async function monitorMicrophone(stream) {
    try {
        // Check if the stream contains audio tracks
        const audioTracks = stream.getAudioTracks();
        if (audioTracks.length === 0) {
            console.error("No audio track available in the stream.");
            return;
        }

        // Create an AudioContext to process the audio from the stream
        const audioContext = new AudioContext();
        const analyser = audioContext.createAnalyser();
        const source = audioContext.createMediaStreamSource(stream);

        // Connect the microphone source to the analyser
        source.connect(analyser);

        // Configure the analyser
        analyser.fftSize = 2048;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        // Time-tracking variables
        let startTime = null;  // Time when volume first exceeds the threshold
        const requiredTime = 150;  // 100ms required to detect speech

        // Function to process the microphone input
        function processAudio() {
            analyser.getByteFrequencyData(dataArray);

            // Calculate the average volume level
            const avgVolume = dataArray.reduce((a, b) => a + b) / bufferLength;

            // If average volume is above background noise, track how long it stays above
            if (stimulusVisible && avgVolume > (4*deviceConfig.backgroundNoise)) {
                // Start tracking time if not already started
                if (startTime === null) {
                    startTime = performance.now();  // Record the time when the threshold is crossed
                } else {
                    const elapsedTime = performance.now() - startTime;
                    if (elapsedTime >= requiredTime) {
                        console.log("Speech detected for over 150ms");
                        noAudioCount = 0
                        clearTimeout(globalSpeechTimer);          
                        onSpeechDetected(); // Enable button
                        startTime = null;  // Reset the timer after detection
                    }
                }
            } else {
                if (!stimulusVisible) {
                  // Reset button timer between trials. (mainly prevent button from being enabled during fixation stimulus) 
                  clearTimeout(buttonTimeout)
                }
                // Reset the timer if the volume drops below the threshold
                startTime = null;
            }

            // Keep calling this function continuously
            requestAnimationFrame(processAudio);
        }

        // Start processing the microphone input
        processAudio();

    } catch (err) {
        console.error('Error analyzing the microphone stream:', err);
    }
}

    }, 1200)

    // Perform actions when speech is detected
}
