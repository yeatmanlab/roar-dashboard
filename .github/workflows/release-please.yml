name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      backend_release_created: ${{ steps.release.outputs.backend--release_created }}
      dashboard_release_created: ${{ steps.release.outputs.dashboard--release_created }}
      api_contract_release_created: ${{ steps.release.outputs.api-contract--release_created }}
      assessment_sdk_release_created: ${{ steps.release.outputs.assessment-sdk--release_created }}
      backend_tag_name: ${{ steps.release.outputs.backend--tag_name }}
      dashboard_tag_name: ${{ steps.release.outputs.dashboard--tag_name }}
      api_contract_tag_name: ${{ steps.release.outputs.api-contract--tag_name }}
      assessment_sdk_tag_name: ${{ steps.release.outputs.assessment-sdk--tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Trigger platform deployment on release
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  trigger-platform-deployment:
    name: Trigger Platform Deployment
    needs: release-please
    if: |
      needs.release-please.outputs.releases_created == 'true' &&
      (needs.release-please.outputs.backend_release_created == 'true' ||
       needs.release-please.outputs.dashboard_release_created == 'true' ||
       needs.release-please.outputs.api_contract_release_created == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger platform deployment workflow
        run: |
          echo "Platform release detected. Tags created:"
          echo "  Backend: ${{ needs.release-please.outputs.backend_tag_name }}"
          echo "  Dashboard: ${{ needs.release-please.outputs.dashboard_tag_name }}"
          echo "  API Contract: ${{ needs.release-please.outputs.api_contract_tag_name }}"
          echo ""
          echo "Production deployment workflow will be triggered by tag push."

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Trigger SDK publishing on release
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  trigger-sdk-publishing:
    name: Trigger SDK Publishing
    needs: release-please
    if: needs.release-please.outputs.assessment_sdk_release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger SDK publishing workflow
        run: |
          echo "Assessment SDK release detected."
          echo "  Tag: ${{ needs.release-please.outputs.assessment_sdk_tag_name }}"
          echo ""
          echo "SDK publishing workflow will be triggered by tag push."
