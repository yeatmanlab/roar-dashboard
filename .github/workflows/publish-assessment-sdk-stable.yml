name: Publish Assessment SDK - Stable

on:
  push:
    tags:
      - 'assessment-sdk-v*'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-environment

      - name: Setup Node.js for publishing
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@roar-dashboard'

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#assessment-sdk-v}"
          PKG_VERSION=$(node -p "require('./packages/assessment-sdk/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version $TAG_VERSION doesn't match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Build API Contract
        run: npm run build -w packages/api-contract

      - name: Build SDK
        run: npm run build -w packages/assessment-sdk

      - name: Test SDK
        run: npm run test -w packages/assessment-sdk

      - name: Publish to GitHub Package Registry
        run: npm publish -w packages/assessment-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CI_GITHUB_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@d4c579d7b14e6fcc4216b6bb6d5ced38b5476975
        with:
          tag_name: ${{ github.ref_name }}
          name: Assessment SDK ${{ github.ref_name }}
          body: |
            Published to GitHub Package Registry
            
            Install with:
            ```bash
            npm install @roar-dashboard/assessment-sdk@latest
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.CI_GITHUB_PAT }}
