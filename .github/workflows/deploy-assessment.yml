name: Deploy Assessment

# Reusable workflow for building and deploying a ROAR assessment to Firebase Hosting.
# Convention: each assessment lives at apps/assessments/<name>/ with a firebase.json,
# a dist/ output dir after build, and npm scripts: build:staging, build:prod.

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub environment to deploy to (e.g. platform:staging)"
        required: true
        type: string
      assessment:
        description: "Assessment directory name under apps/assessments/ (e.g. roar-pa)"
        required: true
        type: string
      build-script:
        description: "npm script to build the assessment (e.g. build:staging)"
        required: true
        type: string
      run-cypress:
        description: "Whether to run Cypress e2e tests after deployment."
        required: false
        type: boolean
        default: false
      cypress-base-url:
        description: "Base URL for Cypress to run tests against. Required when run-cypress is true."
        required: false
        type: string

jobs:
  deploy:
    name: Deploy ${{ inputs.assessment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 15
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      VITE_FIREBASE_APP_API_KEY: ${{ secrets.VITE_FIREBASE_APP_API_KEY }}
      VITE_FIREBASE_APP_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_APP_AUTH_DOMAIN }}
      VITE_FIREBASE_APP_PROJECT_ID: ${{ secrets.VITE_FIREBASE_APP_PROJECT_ID }}
      VITE_FIREBASE_APP_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_APP_STORAGE_BUCKET }}
      VITE_FIREBASE_APP_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_APP_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_APP_ID: ${{ secrets.VITE_FIREBASE_APP_APP_ID }}
      VITE_FIREKIT_APP_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_FIREKIT_APP_RECAPTCHA_SITE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache-dependency-path: 'package-lock.json'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ inputs.assessment }}
        working-directory: apps/assessments/${{ inputs.assessment }}
        run: npm run ${{ inputs.build-script }}

      - name: Deploy ${{ inputs.assessment }}
        uses: ./.github/actions/deploy
        with:
          firebase-channel: default
          firebase-project-id: ${{ secrets.FIREBASE_PROJECT_ID }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account-id: ${{ secrets.FIREBASE_HOSTING_SERVICE_ACCOUNT_ID }}
          dist-path: apps/assessments/${{ inputs.assessment }}/dist
          firebase-config-path: apps/assessments/${{ inputs.assessment }}/firebase.json

  cypress:
    name: Cypress ${{ inputs.assessment }}
    if: ${{ inputs.run-cypress }}
    needs: [deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]
        containers: [1, 2]
    env:
      CYPRESS_BASE_URL: ${{ inputs.cypress-base-url }}
      CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ matrix.browser }}
          working-directory: apps/assessments/${{ inputs.assessment }}
          wait-on: ${{ inputs.cypress-base-url }}
          wait-on-timeout: 60
          record: true
          parallel: true
          spec: cypress/e2e/**/*
          ci-build-id: ${{ github.run_id }}-${{ matrix.browser }}
