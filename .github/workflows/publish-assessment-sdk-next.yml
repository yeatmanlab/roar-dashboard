name: Publish Assessment SDK - Next

on:
  push:
    branches:
      - main
    paths:
      - 'packages/assessment-sdk/**'
      - '.github/workflows/publish-assessment-sdk-next.yml'

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-assessment-sdk-next
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-environment

      - name: Setup Node.js for publishing
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@roar-dashboard'

      - name: Build SDK
        run: npm run build -w packages/assessment-sdk

      - name: Test SDK
        run: npm run test -w packages/assessment-sdk

      - name: Compute and publish next prerelease version
        run: |
          cd packages/assessment-sdk
          # Compute next prerelease version without modifying package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          
          # Increment prerelease: if version is X.Y.Z, compute X.Y.Z-next.1
          # If already X.Y.Z-next.N, increment N
          if [[ $CURRENT_VERSION == *"-next."* ]]; then
            # Extract base and prerelease number
            BASE_VERSION="${CURRENT_VERSION%-next.*}"
            PRERELEASE_NUM="${CURRENT_VERSION##*-next.}"
            NEXT_PRERELEASE_NUM=$((PRERELEASE_NUM + 1))
            NEXT_VERSION="${BASE_VERSION}-next.${NEXT_PRERELEASE_NUM}"
          else
            NEXT_VERSION="${CURRENT_VERSION}-next.1"
          fi
          echo "Publishing version: $NEXT_VERSION"
          
          # Temporarily update package.json for publishing only
          node -e "const pkg = require('./package.json'); pkg.version = '$NEXT_VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n')"
          
          # Publish with next tag
          npm publish --tag next
          
          # Restore original version (don't commit)
          git checkout packages/assessment-sdk/package.json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CI_GITHUB_PAT }}
