name: Publish Assessment SDK - Next

on:
  push:
    branches:
      - main
    paths:
      - 'packages/assessment-sdk/**'
      - '.github/workflows/publish-assessment-sdk-next.yml'

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-assessment-sdk-next
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-environment

      - name: Setup Node.js for publishing
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@roar-dashboard'

      - name: Build SDK
        run: npm run build -w packages/assessment-sdk

      - name: Test SDK
        run: npm run test -w packages/assessment-sdk

      - name: Update version to next prerelease
        run: |
          cd packages/assessment-sdk
          npm version prerelease --preid=next --no-git-tag-version

      - name: Commit version update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add packages/assessment-sdk/package.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: bump assessment-sdk to next prerelease"
          git pull --rebase
          git push

      - name: Publish to GitHub Package Registry
        run: npm publish -w packages/assessment-sdk --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CI_GITHUB_PAT }}
