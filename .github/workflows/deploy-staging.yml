name: Deploy to Staging

# on:
#   push:
#     branches:
#       - main
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}

jobs:
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Generate matrix
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  generate-matrix:
    name: Prepare deployment matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - id: generate-matrix
        run: |
          defaultEnvironment='{"name":"staging","projectId":"${{ secrets.FIREBASE_PROJECT_ID_ADMIN_STAGING }}","envFileKeyRef":"DOTENV_PRIVATE_KEY_STAGING","firebaseServiceAccountRef":"FIREBASE_SERVICE_ACCOUNT_ADMIN_STAGING"}'
          environments='${{ vars.STAGING_ENVIRONMENTS }}'
          matrix="[$(echo "$defaultEnvironment" | jq -c '.')]"
          if [ -n "$environments" ]; then
            matrix="$matrix, $environments"
          fi
          echo "matrix=$(jq -cn --argjson environments "$matrix" '{environments: $environments}')" >> $GITHUB_OUTPUT

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Build and deploy the application
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  build-and-deploy:
    needs: [generate-matrix]
    name: Deploy ${{ fromJson(needs.generate-matrix.outputs.matrix).environments[matrix.index].name }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        environment: ${{ fromJson(needs.generate-matrix.outputs.matrix).environments }}

    steps:
      - name: Debug
        run: |
          echo ${{ toJson(needs.generate-matrix.outputs.matrix) }}

      - name: Get configuration
        id: get-config
        run: |
          config='${{ toJson(fromJson(needs.generate-matrix.outputs.matrix).environments[matrix.index]) }}'
          echo "JSON_RESPONSE<<EOF" >> "$GITHUB_ENV"
          echo "$config" | jq -c '.' >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Use configuration
        run: |
          projectId=$(echo "${{ steps.get-config.outputs.config }}" | jq -r '.projectId')
          envFileKeyRef=$(echo "${{ steps.get-config.outputs.config }}" | jq -r '.envFileKeyRef')
          firebaseServiceAccountRef=$(echo "${{ steps.get-config.outputs.config }}" | jq -r '.firebaseServiceAccountRef')
          echo "Project ID: $projectId"
          echo "Env File Key Ref: $envFileKeyRef"
          echo "Firebase Service Account Ref: $firebaseServiceAccountRef"

