name: Deploy Backend to Dev

on:
  push:
    branches:
      - project/backend-refactor

concurrency:
  # Scope to workflow name so concurrent pushes queue instead of cancelling each other.
  # cancel-in-progress: false — never interrupt a running migration.
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  # ––––––––––––––––––––––––––––––––––––– #
  # 1. Build Docker image
  # ––––––––––––––––––––––––––––––––––––– #
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 10
    outputs:
      image-version: ${{ steps.docker-build.outputs.image-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build and push image
        id: docker-build
        uses: ./.github/actions/build-docker-image
        with:
          gcp-workload-identity-provider: ${{ secrets.GCP_BACKEND_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_BACKEND_SERVICE_ACCOUNT }}
          region: ${{ secrets.GCP_BACKEND_REGION }}
          project-id: ${{ secrets.GCP_PROJECT_ID }}
          artifact-registry-repo: ${{ secrets.BACKEND_ARTIFACT_REGISTRY_REPO }}
          image-name: roar-backend
          image-tag-rules: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
          dockerfile: apps/backend/Dockerfile

  # ––––––––––––––––––––––––––––––––––––– #
  # 2. Migrate databases
  # ––––––––––––––––––––––––––––––––––––– #
  core-db-migrations:
    name: Migrate core database
    needs: [build]
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run core database migrations
        uses: ./.github/actions/migrate-database
        with:
          gcp-workload-identity-provider: ${{ secrets.GCP_DB_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_DB_MIGRATOR_CORE_SERVICE_ACCOUNT }}
          cloudsql-instance-connection-name: ${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }}
          database: core

  assessment-db-migrations:
    name: Migrate assessment database
    needs: [build]
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run assessment database migrations
        uses: ./.github/actions/migrate-database
        with:
          gcp-workload-identity-provider: ${{ secrets.GCP_DB_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_DB_MIGRATOR_ASSESSMENT_SERVICE_ACCOUNT }}
          cloudsql-instance-connection-name: ${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }}
          database: assessment

  # ––––––––––––––––––––––––––––––––––––– #
  # 3. Deploy to Cloud Run
  # ––––––––––––––––––––––––––––––––––––– #
  deploy:
    name: Deploy backend to Cloud Run
    needs: [build, core-db-migrations, assessment-db-migrations]
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Deploy to Cloud Run
        uses: ./.github/actions/deploy-cloud-run
        with:
          gcp-workload-identity-provider: ${{ secrets.GCP_BACKEND_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_BACKEND_SERVICE_ACCOUNT }}
          region: ${{ secrets.GCP_BACKEND_REGION }}
          project-id: ${{ secrets.GCP_PROJECT_ID }}
          artifact-registry-repo: ${{ secrets.BACKEND_ARTIFACT_REGISTRY_REPO }}
          cloud-run-service: ${{ secrets.BACKEND_CLOUD_RUN_SERVICE_NAME }}
          image-name: roar-backend
          image-tag: ${{ needs.build.outputs.image-version }}
