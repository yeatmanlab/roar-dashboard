name: Continuous Integration

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write

jobs:
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Lint & Format
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run check-types

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Test
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Create .env.test from example
        run: cp apps/backend/.env.test.example apps/backend/.env.test

      - name: Start infrastructure
        run: docker compose up -d

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Wait for infrastructure
        run: docker compose up -d --wait

      - name: Run OpenFGA model tests
        uses: openfga/action-openfga-test@v0.1.2
        with:
          test_path: packages/authz/tests

      - name: Run all tests
        run: npm run test
        env:
          DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}

      - name: Report dashboard coverage
        if: success()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: "apps/dashboard"
          name: Dashboard

      - name: Report backend coverage
        if: success()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: "apps/backend"
          name: Backend

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Build the application
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Build application
        run: npm run build

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # End-to-end tests
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  e2e-tests:
    name: "E2E: Dashboard"
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome]
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
      DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}
      DOTENV_CONFIG_PATH: apps/backend/.env.test
      GCLOUD_PROJECT: demo-roar
      VITE_ROAR_API_BASE_URL: http://127.0.0.1:4000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Create .env.test from example
        run: cp apps/backend/.env.test.example apps/backend/.env.test

      - name: Start infrastructure
        run: docker compose up -d

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Wait for infrastructure
        run: docker compose up -d --wait

      - name: Build backend
        run: npx turbo build --filter=roar-backend

      - name: Seed database and start backend
        run: |
          npx tsx apps/backend/seeds/index.ts
          node apps/backend/dist/server.js &
          npx --yes wait-on tcp:127.0.0.1:4000 --timeout 90000

      - name: Build dashboard via turbo
        run: npx turbo build --filter=roar-dashboard

      - name: Execute Cypress tests
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_BASE_URL: "http://127.0.0.1:4173"
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          COMMIT_INFO_MESSAGE: "${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CYPRESS_FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          CYPRESS_FIREBASE_PROJECT_ID: demo-roar
          CYPRESS_FIXTURE_FILE: /tmp/roar-cypress-fixture.json
          CYPRESS_ROAR_API_BASE_URL: http://127.0.0.1:4000
        with:
          install: false
          start: npm run preview -- --host
          tag: ${{ github.event_name }},e2e,${{ matrix.browser }}
          wait-on: ${{ env.CYPRESS_BASE_URL }}
          wait-on-timeout: 120
          record: true
          parallel: false
          browser: ${{ matrix.browser }}
          ci-build-id: ${{ github.run_id }}-e2e-${{ matrix.browser }}
          working-directory: apps/dashboard
          spec: |
            cypress/e2e/smoke/**/*.cy.js

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Component Tests
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  component-tests:
    name: Component tests
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]
    container:
      image: cypress/browsers:node-20.18.0-chrome-130.0.6723.69-1-ff-131.0.3-edge-130.0.2849.52-1
      options: --user 1001
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
      DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      # Build the dashboard via turbo. See the equivalent step in the
      # `e2e-tests` job above for the full rationale.
      - name: Build dashboard via turbo
        run: npx turbo build --filter=roar-dashboard

      - name: Execute Cypress tests
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_BASE_URL: "http://127.0.0.1:4173"
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          COMMIT_INFO_MESSAGE: "${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          component: true
          install: false
          start: npm run preview -- --host
          tag: ${{ github.event_name }},component,${{ matrix.browser }}
          wait-on: ${{ env.CYPRESS_BASE_URL }}
          wait-on-timeout: 120
          record: true
          parallel: true
          browser: ${{ matrix.browser }}
          ci-build-id: ${{ github.run_id }}-component-${{ matrix.browser }}
          working-directory: apps/dashboard
          spec: |
            src/**/*.cy.js

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Deploy to Preview Environment
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    timeout-minutes: 10
    env:
      DOTENV_PRIVATE_KEY_STAGING: ${{ secrets.DOTENV_PRIVATE_KEY_STAGING }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build preview app
        uses: ./.github/actions/build
        with:
          environment: staging
          github-pat: ${{ secrets.CI_GITHUB_PAT }}

      - name: Deploy preview app
        uses: ./.github/actions/deploy-firebase-hosting
        id: deployment
        with:
          firebase-channel: preview
          firebase-project-id: ${{ secrets.CI_FIREBASE_PROJECT_ID_ADMIN_STAGING }}
          gcp-workload-identity-provider: ${{ secrets.CI_FIREBASE_WORKLOAD_IDENTITY_PROVIDER_ADMIN_STAGING }}
          gcp-service-account-id: ${{ secrets.CI_FIREBASE_HOSTING_SERVICE_ACCOUNT_ID_ADMIN_STAGING }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          dist-path: build/apps/dashboard/dist
          firebase-config-path: build/apps/dashboard/firebase/admin/firebase.json

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Detect changed assessments
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  detect-assessment-changes:
    name: Detect changed assessments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-assessment-changes

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Assessment E2E tests
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  e2e-assessments:
    name: "E2E: Assessment / ${{ matrix.assessment }} (${{ matrix.browser }})"
    needs: [detect-assessment-changes, build]
    if: needs.detect-assessment-changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        assessment: ${{ fromJson(needs.detect-assessment-changes.outputs.matrix) }}
        browser: [chrome]
        containers: [1, 2]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Build workspace packages
        run: npx turbo run build --filter='./packages/*'

      - name: Prepare CI variant parameters
        run: |
          cp apps/assessments/${{ matrix.assessment }}/taskVariantParameters.example.json \
             apps/assessments/${{ matrix.assessment }}/taskVariantParameters.json

      # Not every assessment ships Cypress e2e specs (roar-readaloud has the scaffold but no specs
      # yet; roav-apps has no Cypress setup). cypress-io/github-action exits 1 on "no spec files
      # found", so skip the infra spin-up + Cypress run when the assessment has no specs.
      - name: Check for Cypress specs
        id: cypress-specs
        run: |
          if find "apps/assessments/${{ matrix.assessment }}/cypress/e2e" -type f \
               \( -name '*.cy.js' -o -name '*.cy.ts' -o -name '*.cy.jsx' -o -name '*.cy.tsx' \) 2>/dev/null | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Cypress e2e specs for ${{ matrix.assessment }} — skipping the Cypress run."
          fi

      - name: Start assessment infrastructure
        if: steps.cypress-specs.outputs.found == 'true'
        run: docker compose -f docker-compose.assessment.yml up -d --wait
        timeout-minutes: 10
        env:
          ASSESSMENT_NAME: ${{ matrix.assessment }}

      # Pin Chrome so every machine in the parallel run reports an identical browserVersion.
      # Bare ubuntu-latest runners drift the Chrome version as GitHub updates them (e.g. 149 vs
      # 150), which makes Cypress Cloud refuse to group the parallel machines ("we do not
      # parallelize tests across different environments"). This job can't use a cypress/browsers
      # container like e2e-tests / component-tests because it runs `docker compose` to bring up
      # the assessment env (no docker-in-docker inside a job container), so it pins Chrome on the
      # bare runner instead. Version 130 matches the cypress/browsers image the other jobs use.
      - name: Pin Chrome version
        id: setup-chrome
        if: steps.cypress-specs.outputs.found == 'true'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: '130'

      - name: Run Cypress tests
        if: steps.cypress-specs.outputs.found == 'true'
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm run dev:ci
          # Point Cypress at the pinned binary explicitly so it doesn't fall back to the runner's
          # (drifting) system Chrome. The matrix still labels this leg "chrome".
          browser: ${{ steps.setup-chrome.outputs.chrome-path }}
          working-directory: apps/assessments/${{ matrix.assessment }}
          wait-on: "http://localhost:8000"
          wait-on-timeout: 120
          record: true
          parallel: true
          tag: ${{ github.event_name }},${{ matrix.assessment }},${{ matrix.browser }}
          spec: cypress/e2e/**/*
          ci-build-id: ${{ github.run_id }}-${{ matrix.assessment }}-${{ matrix.browser }}
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          BACKEND_URL: http://localhost:4000
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_PROJECT_ID: ${{ secrets.CYPRESS_PROJECT_ID }}
          COMMIT_INFO_MESSAGE: "${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Assessment PR preview links
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  #
  # For each changed assessment, build the staging bundle and deploy it to an
  # ephemeral Firebase Hosting *preview channel* on that assessment's existing
  # staging hosting site, then post the preview URL on the PR. The preview points
  # at the staging backend (baked-in ROAR_API_BASE_URL) and authenticates
  # anonymously against the staging assessment Firebase project via the site's
  # /__/firebase/init.json — identical to the live staging assessment, just on an
  # ephemeral channel. No Firebase apiKeys enter the workflow. Reviewers get the
  # default (first published) variant; in-page variant selection lands with the
  # variant-picker enhancement (a follow-up PR).
  #
  # Credentials come from the `assessments:staging` environment (the assessment
  # hosting sites live under that project; the same secrets drive
  # deploy-assessments-staging.yml). NOTE: for previews to run on PR branches, that
  # environment must permit non-main deployments — i.e. no "required reviewers" gate
  # and no deployment-branch policy restricting it to `main`. If it's locked to main,
  # move these four secrets to a PR-permissive environment (e.g. assessments:preview)
  # and point this job at it instead.
  #
  # Fork PRs receive no repository/environment secrets from GitHub, so this job would
  # otherwise fail at the GCP auth step with empty credentials. The `if` below skips it
  # cleanly for forks — previews run only for same-repo branch PRs (authored by
  # maintainers with push access), which is also the only case that can satisfy the
  # environment's deployment-branch policy.
  preview-assessments:
    name: Preview ${{ matrix.assessment }}
    needs: [detect-assessment-changes, lint, build]
    # Skip cleanly for fork PRs — GitHub withholds secrets from them, so the deploy would
    # fail at GCP auth. Previews run only for same-repo branch PRs.
    if: >-
      needs.detect-assessment-changes.outputs.matrix != '[]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: assessments:staging
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        assessment: ${{ fromJson(needs.detect-assessment-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read hosting site name
        id: hosting
        run: |
          site=$(jq -r '.roar.hosting.staging' apps/assessments/${{ matrix.assessment }}/package.json)
          echo "site=$site" >> "$GITHUB_OUTPUT"

      - name: Build assessment
        uses: ./.github/actions/build-assessment
        with:
          assessment: ${{ matrix.assessment }}
          build-script: build:staging
          roar-api-base-url: ${{ secrets.ROAR_API_BASE_URL }}

      # The assessment firebase.json hardcodes sentry_environment=production in its
      # Report-To/CSP headers; retag it to the PR so preview Sentry events group
      # separately from production issues. Mirrors deploy-assessment.yml.
      - name: Set Sentry environment for preview
        run: |
          sed -i "s|sentry_environment=production|sentry_environment=pr-${{ github.event.pull_request.number }}|g" \
            apps/assessments/${{ matrix.assessment }}/firebase.json

      # No github-token here on purpose: it would trigger the FirebaseExtended action's
      # own PR comment, which isn't keyed per-site and would clobber across matrix legs.
      # We post a per-assessment sticky comment below using the deployment-url output.
      - name: Deploy preview channel
        id: deploy
        uses: ./.github/actions/deploy-firebase-hosting
        with:
          firebase-channel: preview
          expires: 7d
          firebase-hosting-site: ${{ steps.hosting.outputs.site }}
          firebase-project-id: ${{ secrets.FIREBASE_PROJECT_ID }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account-id: ${{ secrets.FIREBASE_HOSTING_SERVICE_ACCOUNT_ID }}
          dist-path: apps/assessments/${{ matrix.assessment }}/dist
          firebase-config-path: apps/assessments/${{ matrix.assessment }}/firebase.json

      - name: Comment preview URL
        if: steps.deploy.outputs.deployment-url != ''
        uses: actions/github-script@v7
        env:
          ASSESSMENT: ${{ matrix.assessment }}
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const assessment = process.env.ASSESSMENT;
            const url = process.env.PREVIEW_URL;
            // Hidden marker keeps one sticky comment per assessment: re-pushes update it
            // in place, and multiple changed assessments never clobber each other.
            const marker = `<!-- assessment-preview:${assessment} -->`;
            const body = [
              marker,
              `### 🔍 Preview — \`${assessment}\``,
              url,
              '',
              "_Runs the default (first published) variant against the **staging** backend, reflecting " +
                "this PR's bundle changes. Expires in 7 days (refreshed on each push). In-page variant " +
                "selection lands with the variant-picker enhancement._",
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
