name: Continuous Integration

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write

jobs:
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Lint & Format
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run check-types

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Test
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}
      CORE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/roar_core_test
      ASSESSMENT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/roar_assessment_test
      FGA_API_URL: http://localhost:8080

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Install OpenFGA
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8 # v3.0.0
        with:
          repo: openfga/openfga
          tag: v1.12.1
          cache: enable

      - name: Start OpenFGA
        run: openfga run &

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Create test databases
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE roar_core_test;"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE roar_assessment_test;"

      - name: Run OpenFGA model tests
        uses: openfga/action-openfga-test@v0.1.2
        with:
          test_path: packages/authz/tests

      - name: Run all tests
        run: npm run test
        env:
          RUN_INTEGRATION_TESTS: "true"
          DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}

      - name: Report dashboard coverage
        if: success()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: "apps/dashboard"
          name: Dashboard

      - name: Report backend coverage
        if: success()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: "apps/backend"
          name: Backend

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Build the application
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Build application
        run: npm run build

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # End-to-end tests
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  #
  # Runs the (post-migration) Cypress e2e smoke spec against a fully local
  # stack: Postgres + OpenFGA + Firebase Auth emulator + backend
  # (server-test.ts) + dashboard Vite preview. The Cypress login helper
  # signs in via the Firebase Web SDK against the emulator (no firekit),
  # and the backend verifies the resulting ID token through
  # FirebaseAuthProvider with `FIREBASE_AUTH_EMULATOR_HOST` set. Legacy e2e
  # specs are `describe.skip`-ed pending per-domain migration — see
  # `cypress/e2e/README.md` and `.ai/rules/frontend-e2e-testing-pattern.md`.
  #
  # The job runs inside the cypress/browsers container. Postgres runs as a
  # service container reachable via `postgres:5432`. OpenFGA can't run as a
  # service container (the official `openfga/openfga` image has only
  # `/openfga` as ENTRYPOINT and no CMD, and `services.<id>.options` can't
  # supply the `run` argument). We also can't reach for `docker run` from
  # inside the job: `cypress/browsers` doesn't ship curl/wget/docker, and
  # the container runs as user 1001 with no access to the mounted docker
  # socket. So OpenFGA is installed as a binary and started as a
  # background process *in the same step* as the backend — that way the
  # process doesn't need to survive across `docker exec` step boundaries,
  # which is what bit us when openfga was started in its own step. The
  # backend, the Auth emulator, and OpenFGA are all reachable on
  # `127.0.0.1` inside the job container.
  e2e-tests:
    name: End-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Only chrome until dashboard-aware specs exist. The smoke spec runs
        # backend-only via cy.request, so a second browser would add CI time
        # without exercising different browser code paths.
        browser: [chrome]
    container:
      image: cypress/browsers:node-20.18.0-chrome-130.0.6723.69-1-ff-131.0.3-edge-130.0.2849.52-1
      options: --user 1001
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      # OpenFGA can't go here — see the job-level comment above for why.
      # It runs as a background process inside the job container.
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
      DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}
      # Backend → Postgres uses the service-container hostname.
      CORE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/roar_core_test
      ASSESSMENT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/roar_assessment_test
      POSTGRES_ADMIN_URL: postgresql://postgres:postgres@postgres:5432/postgres
      # Backend → OpenFGA inside the job container.
      FGA_API_URL: http://127.0.0.1:8080
      # The Firebase Auth emulator still runs as a background process inside
      # the job container (no official emulator-only Docker image).
      FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
      GCLOUD_PROJECT: demo-roar
      # The dashboard bakes this into its bundle at build time so it can
      # reach the locally-running backend.
      VITE_ROAR_API_BASE_URL: http://127.0.0.1:4000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      # Install the OpenFGA binary. We download via the action (which uses
      # node-fetch under the hood, so it works even though cypress/browsers
      # ships without curl), and start it later in the same step as the
      # backend. See the job-level comment for why the binary path is the
      # only one that works in this container.
      - name: Install OpenFGA
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8 # v3.0.0
        with:
          repo: openfga/openfga
          tag: v1.12.1
          cache: enable

      # The Auth emulator is the only one we need; everything else (Firestore,
      # Functions, etc.) is irrelevant once firekit is gone. The temp config
      # tells the emulator to bind on all interfaces so the backend and
      # browser can both reach it on 127.0.0.1.
      - name: Install firebase-tools and start Auth emulator
        run: |
          npm install --no-save firebase-tools
          cat > /tmp/firebase.json <<EOF
          {
            "emulators": {
              "auth": { "host": "0.0.0.0", "port": 9099 },
              "ui": { "enabled": false }
            }
          }
          EOF
          ./node_modules/.bin/firebase emulators:start \
            --only auth \
            --project demo-roar \
            --config /tmp/firebase.json &
          npx --yes wait-on tcp:127.0.0.1:9099 --timeout 60000

      - name: Create test databases
        run: npm run db:create-test-dbs -w apps/backend

      - name: Build backend (with server-test entry)
        run: BUILD_TEST_SERVER=true npx turbo build --filter=roar-backend

      - name: Start OpenFGA and backend server-test
        # OpenFGA and server-test are started in the same step on purpose:
        # background processes started by `bash &` survive across `docker
        # exec` step boundaries in theory (PID 1 of the container reaps
        # them), but in practice we hit `socket hang up` when openfga
        # lived in its own earlier step. Co-locating them with the backend
        # — the only consumer — keeps the whole FGA flow inside a single
        # bash lifecycle, which is reliable.
        shell: bash
        run: |
          openfga run > /tmp/openfga.log 2>&1 &
          npx --yes wait-on tcp:127.0.0.1:8080 --timeout 30000
          node apps/backend/dist/server-test.js &
          # server-test.ts seeds Postgres + OpenFGA + the Firebase Auth
          # emulator before binding to port 4000, so a successful TCP
          # connect is sufficient proof of full readiness.
          npx --yes wait-on tcp:127.0.0.1:4000 --timeout 90000

      # Build the dashboard via turbo so transitive workspace dependencies
      # (`@roar-dashboard/api-contract` and any others declared via `dependsOn`
      # in `turbo.json`) are built in the right order. We do this here rather
      # than letting the Cypress action run `npm run build` from
      # `apps/dashboard/`, because that path bypasses turbo's workspace graph.
      - name: Build dashboard via turbo
        run: npx turbo build --filter=roar-dashboard

      - name: Execute Cypress tests
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_BASE_URL: "http://127.0.0.1:4173"
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          COMMIT_INFO_MESSAGE: "${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Read by Cypress via `Cypress.env(...)`. The auth helper uses
          # these to talk to the emulator and resolve fixture user keys.
          CYPRESS_FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          CYPRESS_FIREBASE_PROJECT_ID: demo-roar
          CYPRESS_FIXTURE_FILE: /tmp/roar-cypress-fixture.json
          # Backend-only specs (cy.request) read this to reach server-test.
          # Set explicitly so smoke specs don't fall back to the default
          # in their helper modules.
          CYPRESS_ROAR_API_BASE_URL: http://127.0.0.1:4000
        with:
          install: false
          # The dashboard is pre-built via turbo above; skip the action's
          # default build step (which would re-build only the dashboard,
          # bypassing turbo).
          build: "true"
          start: npm run preview -- --host
          tag: ${{ github.event_name }},e2e,${{ matrix.browser }}
          wait-on: ${{ env.CYPRESS_BASE_URL }}
          wait-on-timeout: 120
          record: true
          # No `containers` matrix any more — only the smoke spec runs, so
          # parallel splitting across containers would be wasted overhead.
          parallel: false
          browser: ${{ matrix.browser }}
          ci-build-id: ${{ github.run_id }}-e2e-${{ matrix.browser }}
          working-directory: apps/dashboard
          spec: |
            cypress/e2e/smoke/**/*.cy.js

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Component Tests
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  component-tests:
    name: Component tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]
    container:
      image: cypress/browsers:node-20.18.0-chrome-130.0.6723.69-1-ff-131.0.3-edge-130.0.2849.52-1
      options: --user 1001
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
      DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      # Build the dashboard via turbo. See the equivalent step in the
      # `e2e-tests` job above for the full rationale.
      - name: Build dashboard via turbo
        run: npx turbo build --filter=roar-dashboard

      - name: Execute Cypress tests
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_BASE_URL: "http://127.0.0.1:4173"
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          COMMIT_INFO_MESSAGE: "${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          component: true
          install: false
          # The dashboard is pre-built via turbo above.
          build: "true"
          start: npm run preview -- --host
          tag: ${{ github.event_name }},component,${{ matrix.browser }}
          wait-on: ${{ env.CYPRESS_BASE_URL }}
          wait-on-timeout: 120
          record: true
          parallel: true
          browser: ${{ matrix.browser }}
          ci-build-id: ${{ github.run_id }}-component-${{ matrix.browser }}
          working-directory: apps/dashboard
          spec: |
            src/**/*.cy.js

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Deploy to Preview Environment
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    timeout-minutes: 10
    env:
      DOTENV_PRIVATE_KEY_STAGING: ${{ secrets.DOTENV_PRIVATE_KEY_STAGING }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build preview app
        uses: ./.github/actions/build
        with:
          environment: staging
          github-pat: ${{ secrets.CI_GITHUB_PAT }}

      - name: Deploy preview app
        uses: ./.github/actions/deploy
        id: deployment
        with:
          firebase-channel: preview
          firebase-project-id: ${{ secrets.CI_FIREBASE_PROJECT_ID_ADMIN_STAGING }}
          gcp-workload-identity-provider: ${{ secrets.CI_FIREBASE_WORKLOAD_IDENTITY_PROVIDER_ADMIN_STAGING }}
          gcp-service-account-id: ${{ secrets.CI_FIREBASE_HOSTING_SERVICE_ACCOUNT_ID_ADMIN_STAGING }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # - name: Whitelist AppCheck admin environment
      #   if: ${{ success() }}
      #   uses: ./.github/actions/whitelist-appcheck-environment
      #   with:
      #     project-id: ${{ secrets.CI_FIREBASE_PROJECT_ID_ADMIN_STAGING }}
      #     service-account-key: ${{ secrets.CI_FIREBASE_SERVICE_ACCOUNT_ADMIN_STAGING }}
      #     appcheck-site-key: ${{ secrets.FIREBASE_APPCHECK_SITE_KEY_ADMIN_STAGING }}
      #     environment-url: ${{ fromJson(steps.firebase-deploy-preview.outputs.urls)[0] }}

