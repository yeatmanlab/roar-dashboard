name: Continuous Integration

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write

jobs:
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Lint & Format
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run check-types

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Test
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Create .env.test from example
        run: cp apps/backend/.env.test.example apps/backend/.env.test

      - name: Start infrastructure
        run: docker compose up -d

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Wait for infrastructure
        run: docker compose up -d --wait

      - name: Run OpenFGA model tests
        uses: openfga/action-openfga-test@v0.1.2
        with:
          test_path: packages/authz/tests

      - name: Run all tests
        run: npm run test
        env:
          DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}

      - name: Report dashboard coverage
        if: success()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: "apps/dashboard"
          name: Dashboard

      - name: Report backend coverage
        if: success()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: "apps/backend"
          name: Backend

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Build the application
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Build application
        run: npm run build

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # End-to-end tests
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  e2e-tests:
    name: "E2E: Dashboard"
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome]
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
      DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}
      DOTENV_CONFIG_PATH: apps/backend/.env.test
      GCLOUD_PROJECT: demo-roar
      VITE_ROAR_API_BASE_URL: http://127.0.0.1:4000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Create .env.test from example
        run: cp apps/backend/.env.test.example apps/backend/.env.test

      - name: Start infrastructure
        run: docker compose up -d

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Wait for infrastructure
        run: docker compose up -d --wait

      - name: Build backend
        run: npx turbo build --filter=roar-backend

      - name: Seed database and start backend
        run: |
          npx tsx apps/backend/seeds/index.ts
          node apps/backend/dist/server.js &
          npx --yes wait-on tcp:127.0.0.1:4000 --timeout 90000

      - name: Build dashboard via turbo
        run: npx turbo build --filter=roar-dashboard

      - name: Execute Cypress tests
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_BASE_URL: "http://127.0.0.1:4173"
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          COMMIT_INFO_MESSAGE: "${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CYPRESS_FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          CYPRESS_FIREBASE_PROJECT_ID: demo-roar
          CYPRESS_FIXTURE_FILE: /tmp/roar-cypress-fixture.json
          CYPRESS_ROAR_API_BASE_URL: http://127.0.0.1:4000
        with:
          install: false
          start: npm run preview -- --host
          tag: ${{ github.event_name }},e2e,${{ matrix.browser }}
          wait-on: ${{ env.CYPRESS_BASE_URL }}
          wait-on-timeout: 120
          record: true
          parallel: false
          browser: ${{ matrix.browser }}
          ci-build-id: ${{ github.run_id }}-e2e-${{ matrix.browser }}
          working-directory: apps/dashboard
          spec: |
            cypress/e2e/smoke/**/*.cy.js

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Component Tests
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  component-tests:
    name: Component tests
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]
    container:
      image: cypress/browsers:node-20.18.0-chrome-130.0.6723.69-1-ff-131.0.3-edge-130.0.2849.52-1
      options: --user 1001
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
      DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      # Build the dashboard via turbo. See the equivalent step in the
      # `e2e-tests` job above for the full rationale.
      - name: Build dashboard via turbo
        run: npx turbo build --filter=roar-dashboard

      - name: Execute Cypress tests
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_BASE_URL: "http://127.0.0.1:4173"
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          COMMIT_INFO_MESSAGE: "${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          component: true
          install: false
          start: npm run preview -- --host
          tag: ${{ github.event_name }},component,${{ matrix.browser }}
          wait-on: ${{ env.CYPRESS_BASE_URL }}
          wait-on-timeout: 120
          record: true
          parallel: true
          browser: ${{ matrix.browser }}
          ci-build-id: ${{ github.run_id }}-component-${{ matrix.browser }}
          working-directory: apps/dashboard
          spec: |
            src/**/*.cy.js

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Deploy to Preview Environment
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    timeout-minutes: 10
    env:
      DOTENV_PRIVATE_KEY_STAGING: ${{ secrets.DOTENV_PRIVATE_KEY_STAGING }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build preview app
        uses: ./.github/actions/build
        with:
          environment: staging
          github-pat: ${{ secrets.CI_GITHUB_PAT }}

      - name: Deploy preview app
        uses: ./.github/actions/deploy-firebase-hosting
        id: deployment
        with:
          firebase-channel: preview
          firebase-project-id: ${{ secrets.CI_FIREBASE_PROJECT_ID_ADMIN_STAGING }}
          gcp-workload-identity-provider: ${{ secrets.CI_FIREBASE_WORKLOAD_IDENTITY_PROVIDER_ADMIN_STAGING }}
          gcp-service-account-id: ${{ secrets.CI_FIREBASE_HOSTING_SERVICE_ACCOUNT_ID_ADMIN_STAGING }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          dist-path: build/apps/dashboard/dist
          firebase-config-path: build/apps/dashboard/firebase/admin/firebase.json

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Detect changed assessments
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  detect-assessment-changes:
    name: Detect changed assessments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-assessment-changes

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Assessment E2E tests
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  e2e-assessments:
    name: "E2E: Assessment / ${{ matrix.assessment }} (${{ matrix.browser }})"
    needs: [detect-assessment-changes, build]
    if: needs.detect-assessment-changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        assessment: ${{ fromJson(needs.detect-assessment-changes.outputs.matrix) }}
        browser: [chrome]
        containers: [1, 2]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-node-environment

      - name: Build workspace packages
        run: npx turbo run build --filter='./packages/*'

      - name: Prepare CI variant parameters
        run: |
          cp apps/assessments/${{ matrix.assessment }}/taskVariantParameters.example.json \
             apps/assessments/${{ matrix.assessment }}/taskVariantParameters.json

      - name: Start assessment infrastructure
        run: docker compose -f docker-compose.assessment.yml up -d --wait
        timeout-minutes: 10
        env:
          ASSESSMENT_NAME: ${{ matrix.assessment }}

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm run dev:ci
          browser: ${{ matrix.browser }}
          working-directory: apps/assessments/${{ matrix.assessment }}
          wait-on: "http://localhost:8000"
          wait-on-timeout: 120
          record: true
          parallel: true
          tag: ${{ github.event_name }},${{ matrix.assessment }},${{ matrix.browser }}
          spec: cypress/e2e/**/*
          ci-build-id: ${{ github.run_id }}-${{ matrix.assessment }}-${{ matrix.browser }}
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          BACKEND_URL: http://localhost:4000
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_PROJECT_ID: ${{ secrets.CYPRESS_PROJECT_ID }}
          COMMIT_INFO_MESSAGE: "${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
