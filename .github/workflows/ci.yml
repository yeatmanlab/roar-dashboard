name: Continuous Integration

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  # # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # # Lint & Format
  # # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # lint:
  #   name: Lint
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 5

  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4

  #     - name: Setup environment
  #       uses: ./.github/actions/setup-node

  #     - name: Run linter
  #       run: npm run lint

  #     - name: Check format
  #       run: npm run format:check

  # # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # # Test
  # # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # test:
  #   name: Unit tests
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 5

  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4

  #     - name: Setup environment
  #       uses: ./.github/actions/setup-node

  #     - name: Run unit tests
  #       run: npm run test

  #     - name: Report coverage
  #       if: success()
  #       uses: davelosert/vitest-coverage-report-action@v2

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Build the application
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Setup environment
        uses: ./.github/actions/setup-node

      - name: Build application
        run: npm run build

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # End-to-end tests
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest # Replace with Cypress runner
    timeout-minutes: 90
    strategy:
      fail-fast: false
      # matrix:
      #   containers: [1, 2]
    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
      DOTENV_PRIVATE_KEY_TEST: ${{ secrets.DOTENV_PRIVATE_KEY_TEST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
          token: ${{ secrets.CI_GITHUB_PAT }}

      - name: Debug submodule checkout
        run: ls -la env-configs

      - name: Setup environment
        uses: ./.github/actions/setup-node

      - name: Build application
        run: npm run build

      - name: Install Cypress
        run: npm i cypress

      - name: Execute Cypress tests
        uses: cypress-io/github-action@v6
        env: # @TODO: Replace with .env.test file values
          CYPRESS_BASE_URL: 'http://localhost:4173/'
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CLEVER_USERNAME: ${{ secrets.CLEVER_USERNAME }}
          CLEVER_PASSWORD: ${{ secrets.CLEVER_PASSWORD }}
          PARTNER_ADMIN_USERNAME: ${{ secrets.PARTNER_ADMIN_USERNAME }}
          PARTNER_ADMIN_PASSWORD: ${{ secrets.PARTNER_ADMIN_PASSWORD }}
          PARTNER_ADMIN_ID: ${{ secrets.PARTNER_ADMIN_ID }}
          PARTICIPANT_USERNAME: ${{ secrets.PARTICIPANT_USERNAME}}
          PARTICIPANT_PASSWORD: ${{ secrets.PARTICIPANT_PASSWORD }}
          PARTICIPANT_EMAIL: ${{ secrets.PARTICIPANT_EMAIL }}
          PARTICIPANT_EMAIL_PASSWORD: ${{ secrets.PARTICIPANT_EMAIL_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ github.event_name }}
          install: false
          start: npm run preview
          wait-on: ${{ env.CYPRESS_BASE_URL }}
          wait-on-timeout: 120
          record: true
          parallel: true
          spec: |
            'cypress/e2e/participant/default-tests/**/*'
