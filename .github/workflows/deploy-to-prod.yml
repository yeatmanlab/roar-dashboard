name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_description:
        description: 'Release description (supports markdown, can be multi-line)'
        required: false
        type: string
        default: 'Production release'

jobs:
  version_build_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate_token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.LEVANTE_BOT_APP_ID }}
          private_key: ${{ secrets.LEVANTE_BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Read and process version
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PROD_VERSION=${CURRENT_VERSION%-dev}
          TAG_NAME="v${PROD_VERSION}"
          BRANCH_NAME="release/${TAG_NAME}"
          echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          echo "prod_version=${PROD_VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Fail fast if tag or branch already exists
        run: |
          TAG_NAME="${{ steps.version.outputs.tag_name }}"
          BRANCH_NAME="${{ steps.version.outputs.branch_name }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG_NAME} already exists on origin. Bump package.json or delete the tag to retry."
            exit 1
          fi
          if git ls-remote --exit-code --heads origin "refs/heads/${BRANCH_NAME}" >/dev/null 2>&1; then
            echo "::error::Branch ${BRANCH_NAME} already exists on origin. Delete it or bump package.json to retry."
            exit 1
          fi

      - name: Create release branch and tag
        id: release_ref
        run: |
          TAG_NAME="${{ steps.version.outputs.tag_name }}"
          BRANCH_NAME="${{ steps.version.outputs.branch_name }}"
          PROD_VERSION="${{ steps.version.outputs.prod_version }}"
          git checkout -b "${BRANCH_NAME}"
          npm version "${PROD_VERSION}" --no-git-tag-version
          git add package.json
          git commit -m "chore(release): prepare version ${PROD_VERSION}"
          RELEASE_SHA=$(git rev-parse HEAD)
          git tag -a "${TAG_NAME}" "${RELEASE_SHA}" -m "Release ${TAG_NAME}"
          git push --set-upstream origin "${BRANCH_NAME}"
          git push origin "refs/tags/${TAG_NAME}"
          echo "sha=${RELEASE_SHA}" >> $GITHUB_OUTPUT

      - name: Build for production
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          VITE_SURVEYJS_LICENSE_KEY: ${{ secrets.VITE_SURVEYJS_LICENSE_KEY }}
        run: npm run build:prod

      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          sourcemaps: ./dist/assets
          version: ${{ steps.version.outputs.tag_name }}
          finalize: false

      - name: Deploy to Firebase Production
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ steps.generate_token.outputs.token }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD_ADMIN }}
          channelId: live
          projectId: hs-levante-admin-prod
          target: production

      - name: Finalize Sentry Release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ steps.version.outputs.tag_name }}
          finalize: true

      - name: Generate Release Notes
        id: release_notes
        env:
          RELEASE_DESCRIPTION: ${{ github.event.inputs.release_description }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          DEPLOYED_BY: ${{ github.actor }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..${TAG_NAME}" --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -n 10)
          fi

          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo
            echo "$COMMITS"
            echo
            echo "## Deployment Info"
            echo "- Version: ${TAG_NAME}"
            echo "- Environment: Production"
            echo "- Deployed by: ${DEPLOYED_BY}"
            if [ -n "$RELEASE_DESCRIPTION" ]; then
              echo
              echo "## Release Notes"
              echo "$RELEASE_DESCRIPTION"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ steps.generate_token.outputs.token }}
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Release ${{ steps.version.outputs.tag_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          target_commitish: ${{ steps.release_ref.outputs.sha }}

      - name: Update main branch version
        run: |
          git checkout main
          # Remove -dev suffix before version bump
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          BASE_VERSION=${CURRENT_VERSION%-dev}
          # Update package.json with base version
          npm version $BASE_VERSION --no-git-tag-version
          # Increment version based on user selection
          npm version ${{ github.event.inputs.version_type }} --no-git-tag-version
          # Add -dev suffix
          NEW_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION="${NEW_VERSION}-dev"
          # Update package.json with new version
          npm version $NEW_VERSION --no-git-tag-version
          git add package.json
          git commit -m "chore: bump version to $NEW_VERSION"
          git push origin main
