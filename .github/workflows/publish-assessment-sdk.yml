name: Publish Assessment SDK

on:
  push:
    branches:
      - main
    paths:
      - 'packages/assessment-sdk/**'
      - '.github/workflows/publish-assessment-sdk.yml'
    tags:
      - 'assessment-sdk-v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-assessment-sdk
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-environment

      - name: Setup Node.js for publishing
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@yeatmanlab'

      - name: Validate version matches tag (stable only)
        if: startsWith(github.ref, 'refs/tags/assessment-sdk-v')
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#assessment-sdk-v}"
          PKG_VERSION=$(node -p "require('./packages/assessment-sdk/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version $TAG_VERSION doesn't match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Build API Contract
        run: npm run build -w packages/api-contract

      - name: Build SDK
        run: npm run build -w packages/assessment-sdk

      - name: Compute and publish next prerelease version
        if: github.ref == 'refs/heads/main'
        run: |
          cd packages/assessment-sdk
          # Compute next prerelease version using github.run_number for uniqueness
          # This ensures every workflow run produces a unique version
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEXT_VERSION="${CURRENT_VERSION}-next.${{ github.run_number }}"
          echo "Publishing version: $NEXT_VERSION"
          
          # Temporarily update package.json for publishing only
          node -e "const pkg = require('./package.json'); pkg.version = '$NEXT_VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n')"
          
          # Publish with next tag
          npm publish --tag next
          
          # Restore original version (don't commit)
          git checkout -- package.json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish stable version
        if: startsWith(github.ref, 'refs/tags/assessment-sdk-v')
        run: npm publish -w packages/assessment-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
