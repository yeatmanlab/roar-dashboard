name: Deploy Platform to Staging

on:
  push:
    branches:
      # TODO: Remove once backend refactor is complete
      - project/backend-refactor
      - main

concurrency:
  # Scope to workflow name so concurrent pushes queue instead of cancelling each other.
  # cancel-in-progress: false — never interrupt a running migration.
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  # ––––––––––––––––––––––––––––––––––––– #
  # Build backend Docker image
  # ––––––––––––––––––––––––––––––––––––– #
  build-backend:
    name: Build backend Docker image
    runs-on: ubuntu-latest
    environment: platform:staging
    timeout-minutes: 10
    outputs:
      image-version: ${{ steps.docker-build.outputs.image-version }}
      image-digest: ${{ steps.docker-build.outputs.image-digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build and push image
        id: docker-build
        uses: ./.github/actions/build-docker-image
        with:
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_BACKEND_SERVICE_ACCOUNT }}
          region: ${{ secrets.GCP_BACKEND_REGION }}
          project-id: ${{ secrets.GCP_PROJECT_ID }}
          artifact-registry-repo: ${{ secrets.GCP_ARTIFACT_REGISTRY_REPO }}
          image-name: roar-backend
          image-tag-rules: |
            type=sha,prefix=
          dockerfile: apps/backend/Dockerfile

  # ––––––––––––––––––––––––––––––––––––– #
  # Migrate databases
  # ––––––––––––––––––––––––––––––––––––– #
  migrate-db:
    name: Migrate databases
    needs: [build-backend]
    runs-on: ubuntu-latest
    environment: platform:staging
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run core database migrations
        uses: ./.github/actions/migrate-database
        with:
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_DB_MIGRATOR_CORE_SERVICE_ACCOUNT }}
          cloudsql-instance-connection-name: ${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }}
          database: core

      - name: Run assessment database migrations
        uses: ./.github/actions/migrate-database
        with:
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_DB_MIGRATOR_ASSESSMENT_SERVICE_ACCOUNT }}
          cloudsql-instance-connection-name: ${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }}
          database: assessment

  # ––––––––––––––––––––––––––––––––––––– #
  # Deploy Backend
  # ––––––––––––––––––––––––––––––––––––– #
  deploy-backend:
    name: Deploy backend
    needs: [build-backend, migrate-db]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_IAC_DEPLOYER_APP_ID }}
          private-key: ${{ secrets.GH_IAC_DEPLOYER_PRIVATE_KEY }}
          owner: yeatmanlab
          repositories: roar-iac

      - name: Validate image digest format
        run: |
          DIGEST="${{ needs.build-backend.outputs.image-digest }}"
          if [[ ! "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "::error::Invalid image digest: ${DIGEST}"
            exit 1
          fi
          echo "Digest validated: ${DIGEST}"

      - name: Dispatch deploy to roar-iac
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: yeatmanlab/roar-iac
          event-type: deploy-backend-api
          client-payload: >-
            {
              "image_digest": "${{ needs.build-backend.outputs.image-digest }}",
              "source_ref": "${{ github.sha }}",
              "target": "staging"
            }

  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  # Deploy frontend
  # ––––––––––––––––––––––––––––––––––––––––––––––– #
  deploy-frontend:
    name: Deploy frontend
    needs: [deploy-backend]
    runs-on: ubuntu-latest
    environment: platform:staging
    timeout-minutes: 15
    env:
      DOTENV_PRIVATE_KEY_STAGING: ${{ secrets.DOTENV_PRIVATE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build app
        uses: ./.github/actions/build
        with:
          environment: staging
          github-pat: ${{ secrets.CI_GITHUB_PAT }}

      - name: Deploy app
        uses: ./.github/actions/deploy-firebase-hosting
        with:
          firebase-channel: default
          firebase-project-id: ${{ secrets.FIREBASE_PROJECT_ID }}
          firebase-hosting-site: roar-dashboard-staging
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account-id: ${{ secrets.FIREBASE_HOSTING_SERVICE_ACCOUNT_ID }}
          dist-path: build/apps/dashboard/dist
          firebase-config-path: build/apps/dashboard/firebase/admin/firebase.json
