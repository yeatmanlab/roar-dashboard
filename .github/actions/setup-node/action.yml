# –––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––– #
# roar-dashboard/setup-node
#
# This action sets up Node.js and installs the application's npm dependencies whilst caching them. This action is
# designed to be used before executing any npm tasks, such as running unit tests or building the application.
# –––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––– #

name: Setup environment
description: Sets up environment by installing Node.js and the application's npm dependencies.
runs:
  using: 'composite'
  steps:
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Cache node modules
      id: cache-npm
      uses: actions/cache@v4
      env:
        cache-name: cache-node-modules
      with:
        path: ~/.npm
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-
          ${{ runner.os }}-build-
          ${{ runner.os }}-

    - name: List the state of node modules
      if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
      continue-on-error: true
      run: npm list
      shell: bash

    - name: Install dependencies
      run: npm ci
      shell: bash
