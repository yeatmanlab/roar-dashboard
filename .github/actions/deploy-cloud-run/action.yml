# roar-dashboard/build-and-deploy-cloud-run
# –––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––– #

name: Build and Deploy to Cloud Run
description: Builds a Docker image, pushes it to Artifact Registry, and deploys to Cloud Run.

inputs:
  gcp-workload-identity-provider:
    description: "The GCP workload identity provider for authentication."
    required: true
  gcp-service-account:
    description: "The GCP service account email for Cloud Run deployment."
    required: true
  region:
    description: "The GCP region for Artifact Registry and Cloud Run."
    required: true
  project-id:
    description: "The GCP project ID."
    required: true
  artifact-registry-repo:
    description: "The Artifact Registry repository name."
    required: true
  cloud-run-service:
    description: "The Cloud Run service name."
    required: true
  dockerfile:
    description: "Path to the Dockerfile (relative to the build context)."
    required: true
  image-tag:
    description: "The tag for the Docker image (e.g., commit SHA)."
    required: true

runs:
  using: composite
  steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-service-account }}

    - name: Configure Docker for Artifact Registry
      shell: bash
      env:
        REGION: ${{ inputs.region }}
      run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

    - name: Build Docker image
      shell: bash
      env:
        IMAGE: ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project-id }}/${{ inputs.artifact-registry-repo }}/${{ inputs.cloud-run-service }}
        TAG: ${{ inputs.image-tag }}
        DOCKERFILE: ${{ inputs.dockerfile }}
      run: |
        docker build \
          -f "${DOCKERFILE}" \
          -t "${IMAGE}:${TAG}" \
          .

    - name: Push Docker image
      shell: bash
      env:
        IMAGE: ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project-id }}/${{ inputs.artifact-registry-repo }}/${{ inputs.cloud-run-service }}
        TAG: ${{ inputs.image-tag }}
      run: docker push "${IMAGE}:${TAG}"

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ inputs.cloud-run-service }}
        region: ${{ inputs.region }}
        image: ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project-id }}/${{ inputs.artifact-registry-repo }}/${{ inputs.cloud-run-service }}:${{ inputs.image-tag }}
