# –––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––– #
# roar-dashboard/build-docker-image
# –––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––– #

name: Build Docker Image
description: Builds a Docker image and pushes it to Artifact Registry.

inputs:
  gcp-workload-identity-provider:
    description: "The GCP workload identity provider for authentication."
    required: true
  gcp-service-account:
    description: "The GCP service account email."
    required: true
  region:
    description: "The GCP region for Artifact Registry."
    required: true
  project-id:
    description: "The GCP project ID."
    required: true
  artifact-registry-repo:
    description: "The Artifact Registry repository name."
    required: true
  image-name:
    description: "The image name within the repository."
    required: true
  image-tag-rules:
    description: "Newline-separated docker/metadata-action tag rules (e.g., type=sha or type=raw,value=latest)."
    required: true
  dockerfile:
    description: "Path to the Dockerfile."
    required: true
  context:
    description: "Build context directory. Defaults to the directory of the Dockerfile."
    required: false

outputs:
  image-version:
    description: "The primary image version resolved by docker/metadata-action."
    value: ${{ steps.meta.outputs.version }}
  image-tags:
    description: "All fully-qualified image tags that were pushed."
    value: ${{ steps.meta.outputs.tags }}

runs:
  using: composite
  steps:
    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-service-account }}
        token_format: access_token

    - name: Login to Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.region }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project-id }}/${{ inputs.artifact-registry-repo }}/${{ inputs.image-name }}
        tags: ${{ inputs.image-tag-rules }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context || '.' }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
