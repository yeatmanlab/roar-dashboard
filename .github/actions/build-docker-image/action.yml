# roar-dashboard/build-docker-image
# –––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––– #

name: Build Docker Image
description: Builds a Docker image and pushes it to Artifact Registry.

inputs:
  gcp-workload-identity-provider:
    description: "The GCP workload identity provider for authentication."
    required: true
  gcp-service-account:
    description: "The GCP service account email."
    required: true
  region:
    description: "The GCP region for Artifact Registry."
    required: true
  project-id:
    description: "The GCP project ID."
    required: true
  artifact-registry-repo:
    description: "The Artifact Registry repository name."
    required: true
  image-name:
    description: "The image name within the repository."
    required: true
  dockerfile:
    description: "Path to the Dockerfile (relative to the build context)."
    required: true
  image-tag:
    description: "The tag for the Docker image (e.g., commit SHA)."
    required: true

runs:
  using: composite
  steps:
    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-service-account }}
        token_format: access_token

    - name: Login to Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.region }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Build Docker image
      shell: bash
      env:
        IMAGE: ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project-id }}/${{ inputs.artifact-registry-repo }}/${{ inputs.image-name }}
        TAG: ${{ inputs.image-tag }}
        DOCKERFILE: ${{ inputs.dockerfile }}
      run: |
        docker build \
          -f "${DOCKERFILE}" \
          -t "${IMAGE}:${TAG}" \
          .

    - name: Push Docker image
      shell: bash
      env:
        IMAGE: ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project-id }}/${{ inputs.artifact-registry-repo }}/${{ inputs.image-name }}
        TAG: ${{ inputs.image-tag }}
      run: docker push "${IMAGE}:${TAG}"
