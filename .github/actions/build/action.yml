# –––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––– #
# roar-dashboard/build
# –––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––– #

name: Build
description: Builds the ROAR Dashboard application.
inputs:
  github-pat:
    description: 'The GitHub PAT to access the repository.'
    required: true
  commit-sha:
    description: 'The commit SHA to deploy.'
    required: false
  diff-base-sha:
    description: 'The commit SHA to run the diff against, optional.'
    required: false
    default: 'false'
  environment:
    description: 'The environment to deploy to, staging or production.'
    required: true
  override-env-configs:
    description: 'Whether to override the environment configurations.'
    required: false
    default: 'false'
  

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.commit-sha }}
        repository: yeatmanlab/roar-dashboard
        token: ${{ inputs.github-pat }}
        submodules: ${{ inputs.override-env-configs == 'false' && 'recursive' || 'false' }}
        path: build

    - name: Inspect changes
      if: ${{ inputs.diff-base-sha != 'false' }}
      working-directory: build
      shell: bash
      run: |
        echo "Current: roar-dashboard/${{ inputs.environment }}@${{ inputs.diff-base-sha }}"
        echo "Target: roar-dashboard/${{ inputs.environment }}@${{ inputs.commit-sha }}"
        echo "---------------------------------------------"
        echo "Changes:"
        git diff --name-only ${{ inputs.diff-base-sha }} ${{ inputs.commit-sha }} || echo "No changes"

    # Install Node.js and cache global npm modules
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: 'build/.nvmrc'
        cache-dependency-path: 'build/package-lock.json'
        cache: 'npm'

    # Install npm dependencies
    - name: Install dependencies
      working-directory: build
      shell: bash
      run: npm ci

    # Inject dotenv configuration
    - name: Inject environment configuration
      if: ${{ inputs.override-env-configs != 'false' }}
      shell: bash
      run: |
        rm -rf build/apps/dashboard/env-configs
        cp -r ${{ github.event.repository.name }}/apps/dashboard/env-configs build/apps/dashboard/env-configs

    # Build the dashboard via turbo so transitive workspace dependencies
    # (`@roar-dashboard/api-contract` and any others declared via
    # `dependsOn` in `turbo.json`) are built automatically in the right
    # order. The Vite mode is threaded through the `MODE` env var — the
    # dashboard's `build` script reads `${MODE:-development}` and forwards
    # it to `vite build --mode`. `MODE` is declared in `turbo.json`'s
    # `globalEnv`, so turbo passes it to every task AND includes it in
    # the cache key (staging and production builds hash separately).
    #
    # Previously this step used `npx turbo build --filter=roar-dashboard
    # -- --mode <env>`, but turbo's `-- args` passthrough forwards CLI
    # arguments to every package in the build graph. api-contract's
    # build ends in `tsc -p tsconfig.build.types.json`, which rejects
    # the Vite-only `--mode` flag with TS5023 ('Unknown compiler option').
    - name: Build application
      working-directory: build
      env:
        NODE_OPTIONS: '--max_old_space_size=8192'
        MODE: ${{ inputs.environment }}
      shell: bash
      run: npx turbo build --filter=roar-dashboard