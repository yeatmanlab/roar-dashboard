# –––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––– #
# roar-dashboard/build
# –––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––––– #

name: Build
description: Builds the ROAR Dashboard application.
inputs:
  github-pat:
    description: 'The GitHub PAT to access the repository.'
    required: true
  commit-sha:
    description: 'The commit SHA to deploy.'
    required: false
  diff-base-sha:
    description: 'The commit SHA to run the diff against, optional.'
    required: false
    default: 'false'
  environment:
    description: 'The environment to deploy to, staging or production.'
    required: true
  override-env-configs:
    description: 'Whether to override the environment configurations.'
    required: false
    default: 'false'
  

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.commit-sha }}
        repository: yeatmanlab/roar-dashboard
        token: ${{ inputs.github-pat }}
        submodules: ${{ inputs.override-env-configs == 'false' && 'recursive' || 'false' }}
        path: build

    - name: Inspect changes
      if: ${{ inputs.diff-base-sha != 'false' }}
      working-directory: build
      shell: bash
      run: |
        echo "Current: roar-dashboard/${{ inputs.environment }}@${{ inputs.diff-base-sha }}"
        echo "Target: roar-dashboard/${{ inputs.environment }}@${{ inputs.commit-sha }}"
        echo "---------------------------------------------"
        echo "Changes:"
        git diff --name-only ${{ inputs.diff-base-sha }} ${{ inputs.commit-sha }} || echo "No changes"

    # Install Node.js and cache global npm modules
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: 'build/.nvmrc'
        cache-dependency-path: 'build/package-lock.json'
        cache: 'npm'

    # Install npm dependencies
    - name: Install dependencies
      working-directory: build
      shell: bash
      run: npm ci

    # Inject dotenv configuration
    - name: Inject environment configuration
      if: ${{ inputs.override-env-configs != 'false' }}
      shell: bash
      run: |
        rm -rf build/apps/dashboard/env-configs
        cp -r ${{ github.event.repository.name }}/apps/dashboard/env-configs build/apps/dashboard/env-configs

    # Build the dashboard in two passes so the Vite-only `--mode` flag
    # doesn't leak into upstream workspace builds.
    #
    # Pass 1: turbo builds every dependency of roar-dashboard (currently
    # @roar-dashboard/api-contract; anything else added later via
    # `dependsOn` in `turbo.json` lands here automatically) without any
    # extra CLI args. Earlier this step ran turbo as
    # `npx turbo build --filter=roar-dashboard -- --mode <env>`, but
    # turbo forwards `-- args` to every matched package's build script.
    # api-contract's build chain ends in `tsc -p tsconfig.build.types.json`,
    # which rejects the Vite-style `--mode` flag with TS5023.
    #
    # Pass 2: build the dashboard directly so `--mode` reaches only `vite
    # build` (where it selects the `.env.<mode>` file and sets
    # `import.meta.env.MODE`). At this point the dashboard's transitive
    # `dist/` artifacts already exist from pass 1.
    - name: Build roar-dashboard dependencies
      working-directory: build
      env:
        NODE_OPTIONS: '--max_old_space_size=8192'
      shell: bash
      run: npx turbo build --filter='...^roar-dashboard'

    - name: Build roar-dashboard
      working-directory: build
      env:
        NODE_OPTIONS: '--max_old_space_size=8192'
      shell: bash
      run: npm run build -w apps/dashboard -- --mode ${{ inputs.environment }}