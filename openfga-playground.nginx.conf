server {
    listen       5051;
    server_name  localhost;

    # Proxy OpenFGA API calls through nginx to avoid cross-origin loopback restrictions
    location ^~ /fga/ {
        proxy_pass https://openfga:8080/;
        proxy_ssl_verify off;
    }

    # Serve the playground page, rewriting URLs to go through this proxy
    location /playground/ {
        proxy_pass http://openfga:3000/playground/;
        proxy_set_header Accept-Encoding "";
        sub_filter "https://play.fga.dev/" "/";
        sub_filter "{{.HTTPServerURL}}" "$host%3a$server_port/fga";
        sub_filter "{{.PlaygroundAPIToken}}" "";
        sub_filter_once off;
    }

    # Proxy play.fga.dev assets, stripping CSP to allow local connections
    location / {
        proxy_set_header Accept-Encoding "";
        proxy_pass https://play.fga.dev;
        proxy_hide_header content-security-policy;
        proxy_ssl_server_name on;
        sub_filter "{{.HTTPServerURL}}" "$host%3a$server_port/fga";
        sub_filter_once off;
    }
}
