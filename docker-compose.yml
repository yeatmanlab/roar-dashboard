name: roar-platform

# Local full-stack development: Postgres, OpenFGA, and the Firebase Auth emulator.
#
# Usage:
#   docker compose up -d --wait

services:
  postgres:
    container_name: roar-postgres
    image: postgres:18
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "${ROAR_PG_PORT:-5432}:5432"
    volumes:
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12

  # OpenFGA schema migrations — runs once against the roar_openfga database
  # created by the Postgres init script. Must complete before the server starts.
  openfga-migrate:
    container_name: roar-openfga-migrate
    image: openfga/openfga:v1.12.1
    command: migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@postgres:5432/roar_openfga

  # Postgres-backed OpenFGA — FGA data persists across container restarts.
  openfga:
    container_name: roar-openfga
    image: openfga/openfga:v1.12.1
    command: run
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    ports:
      - "${ROAR_FGA_PORT:-4010}:8080"
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@postgres:5432/roar_openfga
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=:8081"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Shared emulator image (docker/firebase-emulator) — this stack starts auth only;
  # the assessment stack starts auth + storage from the same image and config.
  firebase-auth-emulator:
    container_name: roar-firebase-auth
    build: docker/firebase-emulator
    command: >
      emulators:start
        --only auth
        --project ${GCLOUD_PROJECT:-demo-roar}
        --config /firebase.json
        --import /emulator-data
        --export-on-exit /emulator-data
    ports:
      - "${ROAR_AUTH_PORT:-9099}:9099"
      - "${ROAR_AUTH_UI_PORT:-9999}:9000"
    volumes:
      - ./docker/firebase-emulator/firebase.json:/firebase.json:ro
      # firebase.json references storage.rules relative to its own location; mount it
      # so the config resolves even though this stack doesn't start the Storage emulator.
      - ./docker/firebase-emulator/storage.rules:/storage.rules:ro
      - firebase-auth-data:/emulator-data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9099/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  firebase-auth-data:
