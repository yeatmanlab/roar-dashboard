name: roar-platform

services:
  # –––––––––––––––––––––––––––––––––––––––––––––––– #
  # OpenFGA
  # Authorization service for relationship-based access control.
  #
  # API:        https://localhost:5050
  # Playground: http://localhost:5051/playground (via nginx proxy)
  #
  # After first run, initialise the store and model:
  #   npm run fga:init -w apps/backend
  #
  # Requires Docker Compose v2 (docker compose, not docker-compose).
  # –––––––––––––––––––––––––––––––––––––––––––––––– #
  openfga:
    container_name: openfga
    image: openfga/openfga:v1.12.1
    command: run
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    ports:
      - "5050:8080" # HTTP API
      - "5052:8081" # gRPC
    volumes:
      - ./certs:/certs:ro
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@host.docker.internal:5432/roar_openfga
      - OPENFGA_PLAYGROUND_ENABLED=true
      - OPENFGA_HTTP_TLS_ENABLED=true
      - OPENFGA_HTTP_TLS_CERT=/certs/roar-local.crt
      - OPENFGA_HTTP_TLS_KEY=/certs/roar-local.key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Nginx reverse proxy for the OpenFGA Playground.
  # Proxies play.fga.dev through localhost to avoid Chrome's Private Network
  # Access restriction (public origin → loopback is blocked by default).
  openfga-playground:
    container_name: openfga-playground
    image: nginx:alpine
    depends_on:
      - openfga
    ports:
      - "5051:5051"
    volumes:
      - ./openfga-playground.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # Runs OpenFGA's database migrations against the local openfga Postgres database.
  # Exits on completion — openfga service waits for this before starting.
  openfga-migrate:
    container_name: openfga-migrate
    image: openfga/openfga:v1.12.1
    command: migrate
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@host.docker.internal:5432/roar_openfga
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure

  # Run the init script to instantiate ephemeral roar_core and roar_assessment postgres instances for researcher development
  researcher-db:
    container_name: researcher-db
    image: postgres:17
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
    restart: on-failure
    environment:
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-researcher-db.sh:/docker-entrypoint-initdb.d/01-init-databases.sh:ro

  # Run the backend Drizzle migration script to ensure ephemeral researcher-db always maintains the latest structure
  researcher-db-migrate:
    container_name: researcher-db-migrate
    build:
      context: .
      dockerfile: migrate.Dockerfile
    working_dir: /app
    volumes:
      # Only the files that change during normal development are mounted at runtime.
      # Everything else (node_modules, assessment-schema build) is baked into the
      # image at build time, so the container never writes to the host filesystem.
      - ./apps/backend/src/db:/app/apps/backend/src/db:ro
      - ./apps/backend/migrations:/app/apps/backend/migrations:ro
      - ./apps/backend/scripts:/app/apps/backend/scripts:ro
      - ./scripts:/app/scripts:ro
      - ./apps/backend/drizzle.core.config.ts:/app/apps/backend/drizzle.core.config.ts:ro
      - ./apps/backend/drizzle.assessment.config.ts:/app/apps/backend/drizzle.assessment.config.ts:ro
      - ./apps/backend/tsconfig.json:/app/apps/backend/tsconfig.json:ro
    environment:
      - CORE_DATABASE_URL=postgres://postgres@researcher-db:5432/roar_core
      - ASSESSMENT_DATABASE_URL=postgres://postgres@researcher-db:5432/roar_assessment
      - CORE_DB=roar_core
      - ASSESSMENT_DB=roar_assessment
      - PG_HOST=researcher-db
      - PG_PORT=5432
      - PG_USER=postgres
    command: sh -c "./scripts/setup-fdw-local.sh && npm run db:migrate -w apps/backend && npm run db:seed:pa -w apps/backend"
    depends_on:
      researcher-db:
        condition: service_healthy
    # restart: on-failure is intentionally omitted — this is a one-shot service.
    # Restarting on failure would conflict with `docker compose run --rm`, which
    # blocks until the container exits 0.

volumes:
  pgdata:
