name: roar-assessment

# ──────────────────────────────────────────────────────────────────────────────
# Assessment environment — full local stack for running ROAR assessments.
#
# Start:
#   npm run assessment-environment:up -w apps/assessments/roar-pa
#   (or: bash scripts/assessment-env-up.sh)
#
# Stop and delete data:
#   npm run assessment-environment:down -w apps/assessments/roar-pa
#   (or: bash scripts/assessment-env-down.sh)
#
# Rebuild images after pulling new code:
#   docker compose -f docker-compose.assessment.yml build
#
# Service dependency order:
#   assessment-db (healthy) → assessment-db-migrate (completed)
#                           → firebase-emulator (healthy)
#                           → backend (healthy)
#                           → assessment dev server (on host)
#
# Requires Docker Compose v2 (docker compose, not docker-compose).
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ────────────────────────────────────────────────────────────────────────────
  # Ephemeral PostgreSQL instance.
  # Hosts roar_core and roar_assessment (created by the entrypoint init script).
  #
  # Binds to the standard Postgres port. If you have a local PostgreSQL instance
  # running, stop it before starting the assessment environment:
  #   macOS (Homebrew): brew services stop postgresql@<version>
  #   Ubuntu/Debian:    sudo systemctl stop postgresql
  # ────────────────────────────────────────────────────────────────────────────
  assessment-db:
    container_name: assessment-db
    image: postgres:17
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 5s
    environment:
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-assessment-db.sh:/docker-entrypoint-initdb.d/01-init-databases.sh:ro
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # One-shot migration runner.
  # Sets up postgres_fdw prerequisites, applies all Drizzle migrations, and
  # seeds the assessment task data. ASSESSMENT_NAME is set by assessment-env-up.sh
  # and drives the db:seed:${ASSESSMENT_NAME} script. Exits 0 on success.
  # ────────────────────────────────────────────────────────────────────────────
  assessment-db-migrate:
    container_name: assessment-db-migrate
    build:
      context: .
      dockerfile: assessment.Dockerfile
      target: assessment-runtime
    working_dir: /app
    command: >
      sh -c "
        ./scripts/setup-fdw-local.sh &&
        cd apps/backend &&
        npm run db:migrate &&
        npm run db:seed:${ASSESSMENT_NAME:-}
      "
    environment:
      ASSESSMENT_NAME: ${ASSESSMENT_NAME:-}
      CORE_DATABASE_URL: postgres://postgres@assessment-db:5432/roar_core
      ASSESSMENT_DATABASE_URL: postgres://postgres@assessment-db:5432/roar_assessment
      CORE_DB: roar_core
      ASSESSMENT_DB: roar_assessment
      PG_HOST: assessment-db
      PG_PORT: "5432"
      PG_USER: postgres
      TASK_VARIANT_PARAMETERS_FILE: /app/assessment-config/taskVariantParameters.json
    volumes:
      - ./apps/assessments/${ASSESSMENT_NAME:-}:/app/assessment-config:ro
    depends_on:
      assessment-db:
        condition: service_healthy
    # One-shot service — no restart policy.

  # ────────────────────────────────────────────────────────────────────────────
  # Firebase Auth + Storage emulators.
  # Auth is pure Node.js; Storage needs a JRE (installed in the firebase-emulator image)
  # to run the rules runtime. Assessments connect via FIREBASE_AUTH_EMULATOR_HOST=127.0.0.1:9099
  # (auth) and upload recordings to the Storage emulator on 127.0.0.1:9199, viewable in the
  # Emulator UI on :9000.
  # ────────────────────────────────────────────────────────────────────────────
  firebase-emulator:
    container_name: firebase-emulator
    build:
      context: .
      dockerfile: assessment.Dockerfile
      target: firebase-emulator
    volumes:
      - ./apps/assessments/shared/firebase.json:/app/firebase.json:ro
      # firebase.json references storage.rules; mount it so the Storage emulator can load it.
      - ./apps/assessments/shared/storage.rules:/app/storage.rules:ro
    command: >
      firebase emulators:start
        --only auth,storage
        --project demo-roar
        --config /app/firebase.json
    ports:
      - "9099:9099"
      # Storage emulator (recording uploads) and the Emulator UI (view recordings at :9000,
      # clear of the backend on :4000).
      - "9199:9199"
      - "9000:9000"
    healthcheck:
      # curl returns 0 on any HTTP response — checks that both the auth (9099) and storage
      # (9199) emulators are accepting connections so `--wait` doesn't proceed before uploads work.
      test:
        [
          "CMD-SHELL",
          "curl --silent http://localhost:9099/ --output /dev/null && curl --silent http://localhost:9199/ --output /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Backend API server.
  # Runs in production mode (HTTP, no TLS) on port 4000.
  # FGA vars are set to placeholder values — anonymous assessment runs do not
  # trigger FGA calls (same-user access check short-circuits before any FGA call).
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    container_name: assessment-backend
    build:
      context: .
      dockerfile: assessment.Dockerfile
      target: assessment-runtime
    environment:
      NODE_ENV: production
      PORT: "4000"
      CORE_DATABASE_URL: postgres://postgres@assessment-db:5432/roar_core
      ASSESSMENT_DATABASE_URL: postgres://postgres@assessment-db:5432/roar_assessment
      # Canonical project identifier for emulated Firebase projects
      # Should match FIREBASE_EMULATOR_PROJECT_ID constant in @assessment-schema/src/firebase-emulator.ts
      GOOGLE_CLOUD_PROJECT: demo-roar
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
      # The webpack dev server proxies /v1 to the backend so CORS never applies
      # in this environment. This value just satisfies the production boot check
      # (ALLOWED_ORIGINS must be set when NODE_ENV=production).
      ALLOWED_ORIGINS: "http://localhost:8000"
      # Placeholder FGA config — the FGA client must be initialized at startup
      # (module-level service instantiation), but FGA is never actually called
      # for anonymous assessment runs.
      FGA_API_URL: http://placeholder:5050
      FGA_STORE_ID: "00000000000000000000000000"
      FGA_MODEL_ID: "00000000000000000000000000"
    ports:
      - "4000:4000"
    depends_on:
      assessment-db-migrate:
        condition: service_completed_successfully
      firebase-emulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health/live"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
