name: roar-assessment

# ──────────────────────────────────────────────────────────────────────────────
# Assessment environment — full local stack for running ROAR assessments.
#
# Start (run from an assessment directory, e.g. apps/assessments/roar-pa):
#   npm start
#   (or: bash ../../../scripts/assessment-env-up.sh)
#
# Stop and delete data (run from an assessment directory):
#   npm stop
#   (or: bash ../../../scripts/assessment-env-down.sh)
#
# Rebuild images after pulling new code (run from an assessment directory):
#   npm run rebuild
#   (or: bash ../../../scripts/assessment-env-build.sh)
#
# Service dependency order:
#   assessment-db (healthy) → assessment-db-migrate (completed)
#                           → firebase-emulator (healthy)
#                           → backend (healthy)
#                           → assessment dev server (on host)
#
# Requires Docker Compose v2 (docker compose, not docker-compose).
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ────────────────────────────────────────────────────────────────────────────
  # Ephemeral PostgreSQL instance.
  # Uses the shared init script (docker/postgres) — the same one the platform
  # stack runs — which creates the databases and provisions the postgres_fdw
  # prerequisites over the Unix socket at first boot. The extra databases it
  # creates (test + OpenFGA) are unused here and harmless.
  #
  # Published on host port ${ASSESSMENT_PG_PORT:-5433} — deliberately NOT the
  # standard 5432 — so this ephemeral stack can run alongside a persistent
  # platform-dev Postgres on 5432 (see docker-compose.yml, ROAR_PG_PORT).
  # The assessment scripts export the same variable (scripts/assessment-common.sh),
  # so the port the scripts connect to and the port Compose publishes always match.
  # ────────────────────────────────────────────────────────────────────────────
  assessment-db:
    container_name: assessment-db
    image: postgres:18
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 5s
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Host side defaults to 5433 to coexist with a persistent Postgres on 5432.
      - "${ASSESSMENT_PG_PORT:-5433}:5432"
    volumes:
      # postgres-18-data (not the previous "pgdata") so the Postgres 17 → 18 bump
      # and the switch to the shared init script both take effect on a fresh
      # volume — init scripts only run when the data directory is empty. The
      # postgres:18 image expects the mount at /var/lib/postgresql (not .../data);
      # it lays out major-version subdirectories underneath.
      - postgres-18-data:/var/lib/postgresql
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # One-shot migration runner.
  # Applies all Drizzle migrations and seeds the assessment task data (FDW
  # prerequisites are provisioned by the Postgres init script). ASSESSMENT_NAME
  # is set by assessment-env-up.sh and drives the dev:seed:tasks --task
  # ${ASSESSMENT_NAME} script. Exits 0 on success.
  # ────────────────────────────────────────────────────────────────────────────
  assessment-db-migrate:
    container_name: assessment-db-migrate
    build:
      context: .
      dockerfile: assessment.Dockerfile
      target: assessment-runtime
    working_dir: /app/apps/backend
    command: >
      sh -c "
        npm run db:migrate &&
        npm run dev:seed:tasks -- --task ${ASSESSMENT_NAME:-}
      "
    environment:
      ASSESSMENT_NAME: ${ASSESSMENT_NAME:-}
      CORE_DATABASE_URL: postgres://postgres:postgres@assessment-db:5432/roar_core
      ASSESSMENT_DATABASE_URL: postgres://postgres:postgres@assessment-db:5432/roar_assessment
      TASK_VARIANT_PARAMETERS_FILE: /app/assessment-config/taskVariantParameters.json
    volumes:
      - ./apps/assessments/${ASSESSMENT_NAME:-}:/app/assessment-config:ro
    depends_on:
      assessment-db:
        condition: service_healthy
    # One-shot service — no restart policy.

  # ────────────────────────────────────────────────────────────────────────────
  # Firebase Auth + Storage emulators.
  # Uses the shared emulator image (docker/firebase-emulator) — the platform stack
  # starts auth only from the same image and config; this stack adds storage.
  # Assessments connect via FIREBASE_AUTH_EMULATOR_HOST=127.0.0.1:9099 (auth) and
  # upload recordings to the Storage emulator on 127.0.0.1:9199, viewable in the
  # Emulator UI on :9000.
  # ────────────────────────────────────────────────────────────────────────────
  firebase-emulator:
    container_name: firebase-emulator
    build: docker/firebase-emulator
    volumes:
      - ./docker/firebase-emulator/firebase.json:/firebase.json:ro
      # firebase.json references storage.rules; mount it so the Storage emulator can load it.
      - ./docker/firebase-emulator/storage.rules:/storage.rules:ro
    command: >
      emulators:start
        --only auth,storage
        --project demo-roar
        --config /firebase.json
    ports:
      - "9099:9099"
      # Storage emulator (recording uploads) and the Emulator UI (view recordings at :9000,
      # clear of the backend on :4000).
      - "9199:9199"
      - "9000:9000"
    healthcheck:
      # curl returns 0 on any HTTP response — checks that both the auth (9099) and storage
      # (9199) emulators are accepting connections so `--wait` doesn't proceed before uploads work.
      test:
        [
          "CMD-SHELL",
          "curl --silent http://localhost:9099/ --output /dev/null && curl --silent http://localhost:9199/ --output /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Backend API server.
  # Runs in production mode (HTTP, no TLS) on port 4000.
  # FGA vars are set to placeholder values — anonymous assessment runs do not
  # trigger FGA calls (same-user access check short-circuits before any FGA call).
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    container_name: assessment-backend
    build:
      context: .
      dockerfile: assessment.Dockerfile
      target: assessment-runtime
    environment:
      NODE_ENV: production
      PORT: "4000"
      CORE_DATABASE_URL: postgres://postgres:postgres@assessment-db:5432/roar_core
      ASSESSMENT_DATABASE_URL: postgres://postgres:postgres@assessment-db:5432/roar_assessment
      # Canonical project identifier for emulated Firebase projects
      # Should match FIREBASE_EMULATOR_PROJECT_ID constant in @assessment-schema/src/firebase-emulator.ts
      GOOGLE_CLOUD_PROJECT: demo-roar
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
      # The webpack dev server proxies /v1 to the backend so CORS never applies
      # in this environment. This value just satisfies the production boot check
      # (ALLOWED_ORIGINS must be set when NODE_ENV=production).
      ALLOWED_ORIGINS: "http://localhost:8000"
      # Placeholder FGA config — the FGA client must be initialized at startup
      # (module-level service instantiation), but FGA is never actually called
      # for anonymous assessment runs (the same-user access check short-circuits
      # first). Deliberate: this stack ships no OpenFGA service — see
      # yeatmanlab/roar-project-management#1999.
      FGA_API_URL: http://placeholder:5050
      FGA_STORE_ID: "00000000000000000000000000"
      FGA_MODEL_ID: "00000000000000000000000000"
    ports:
      - "4000:4000"
    depends_on:
      assessment-db-migrate:
        condition: service_completed_successfully
      firebase-emulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health/live"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres-18-data:
