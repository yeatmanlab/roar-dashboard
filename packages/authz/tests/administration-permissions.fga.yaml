name: Administration Permissions
model_file: ../authorization-model.fga

tuples:
  # ─── District hierarchy (bidirectional) ────────────────────────────
  - user: district:district-a
    relation: parent_org
    object: school:school-a
  - user: school:school-a
    relation: child_school
    object: district:district-a
  - user: school:school-a
    relation: parent_org
    object: class:class-x
  - user: class:class-x
    relation: child_class
    object: school:school-a

  # ─── Memberships (with enrollment condition context) ───────────────
  - user: user:district-admin
    relation: district_administrator
    object: district:district-a
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"
  - user: user:school-teacher
    relation: teacher
    object: school:school-a
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"
  - user: user:student-x
    relation: student
    object: class:class-x
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"
  - user: user:class-guardian
    relation: guardian
    object: class:class-x
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"

  # ─── Supervisory role at class level (for subtree ancestor access) ─
  - user: user:class-teacher
    relation: teacher
    object: class:class-x
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"

  # ─── District-level educator ────────────
  - user: user:district-teacher
    relation: teacher
    object: district:district-a
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"

  # ─── Administration assignments ────────────────────────────────────
  - user: district:district-a
    relation: assigned_district
    object: administration:admin-at-district
  - user: school:school-a
    relation: assigned_school
    object: administration:admin-at-school
  - user: class:class-x
    relation: assigned_class
    object: administration:admin-at-class
  - user: group:group-g
    relation: assigned_group
    object: administration:admin-at-group

  # ─── Group memberships (specific roles) ──────────────────────────
  - user: user:group-member
    relation: student
    object: group:group-g
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"
  - user: user:group-teacher
    relation: teacher
    object: group:group-g
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"
  - user: user:group-admin
    relation: administrator
    object: group:group-g
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"

  # ─── Separate district tree for isolation tests ──────────────────
  - user: district:district-b
    relation: parent_org
    object: school:school-b
  - user: school:school-b
    relation: child_school
    object: district:district-b
  - user: user:admin-b
    relation: administrator
    object: district:district-b
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"
  - user: user:student-b
    relation: student
    object: school:school-b
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"
  - user: district:district-b
    relation: assigned_district
    object: administration:admin-in-b

  # ─── Multi-entity administration (assigned to both district and class) ─
  - user: district:district-a
    relation: assigned_district
    object: administration:admin-multi
  - user: class:class-x
    relation: assigned_class
    object: administration:admin-multi

  # ─── Admin-tier roles (spot-check non-district_administrator) ─────
  - user: user:sys-admin
    relation: system_administrator
    object: district:district-a
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"
  - user: user:site-admin
    relation: site_administrator
    object: district:district-a
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"

  # ─── Non-teacher educator roles ──────────────────────────────────
  - user: user:school-counselor
    relation: counselor
    object: school:school-a
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"
  - user: user:class-aide
    relation: aide
    object: class:class-x
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"
  - user: user:district-proctor
    relation: proctor
    object: district:district-a
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"

  # ─── Administration assigned to school + group simultaneously ────
  - user: school:school-a
    relation: assigned_school
    object: administration:admin-school-and-group
  - user: group:group-g
    relation: assigned_group
    object: administration:admin-school-and-group

  # ─── Cross-tree user: teacher in tree B + student in tree A ──────
  - user: user:cross-tree-user
    relation: teacher
    object: school:school-b
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"
  - user: user:cross-tree-user
    relation: student
    object: class:class-x
    condition:
      name: active_membership
      context:
        grant_start: "2020-01-01T00:00:00Z"
        grant_end: "9999-12-31T23:59:59Z"

tests:
  # ─── Student permissions ───────────────────────────────────────────

  - name: Student can list/read class-assigned administration
    check:
      - user: user:student-x
        object: administration:admin-at-class
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_create_run: true
          can_create: false
          can_update: false
          can_delete: false
          can_list_users: false

          can_read_scores: false

  - name: Student at class sees school-assigned administration (ancestor access)
    check:
      - user: user:student-x
        object: administration:admin-at-school
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_create_run: true
          can_delete: false

          can_read_scores: false

  - name: Student at class sees district-assigned administration (ancestor access via bidirectional hierarchy)
    check:
      - user: user:student-x
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_create_run: true
          can_delete: false

          can_read_scores: false

  # ─── District admin permissions ────────────────────────────────────

  - name: District admin can list/read district-assigned administration
    check:
      - user: user:district-admin
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_create: false
          can_update: false
          can_delete: false

          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create_run: false

  - name: District admin sees school-level administration (descendant access)
    check:
      - user: user:district-admin
        object: administration:admin-at-school
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_create: false
          can_update: false
          can_delete: false
          can_list_users: true

  - name: District admin sees class-level administration (descendant access)
    check:
      - user: user:district-admin
        object: administration:admin-at-class
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_create: false
          can_update: false
          can_delete: false
          can_list_users: true

          can_read_scores: true
          can_create_run: false

  # ─── School teacher permissions ────────────────────────────────────

  - name: School teacher sees school-assigned administration
    check:
      - user: user:school-teacher
        object: administration:admin-at-school
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true

          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create: false
          can_update: false
          can_delete: false
          can_create_run: false

  - name: School teacher CANNOT see class-level administration (no descendant access for educators)
    check:
      - user: user:school-teacher
        object: administration:admin-at-class
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false
          can_list_users: false
          can_create: false
          can_update: false
          can_delete: false

  - name: School teacher sees district-level administration (ancestor access via subtree)
    check:
      - user: user:school-teacher
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create: false
          can_update: false
          can_delete: false
          can_create_run: false

  # ─── Class teacher permissions (ancestor access via subtree) ──────

  - name: Class teacher sees class-assigned administration
    check:
      - user: user:class-teacher
        object: administration:admin-at-class
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create: false
          can_update: false
          can_delete: false
          can_create_run: false

  - name: Class teacher sees school-assigned administration (ancestor access via subtree)
    check:
      - user: user:class-teacher
        object: administration:admin-at-school
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create: false
          can_update: false
          can_delete: false
          can_create_run: false

  - name: Class teacher sees district-assigned administration (ancestor access via subtree, two hops)
    check:
      - user: user:class-teacher
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create: false
          can_update: false
          can_delete: false
          can_create_run: false

  # ─── District-level educator permissions (edge case) ──────────────

  - name: District-level educator can list/read but NOT delete administrations
    check:
      - user: user:district-teacher
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create: false
          can_update: false
          can_delete: false
          can_create_run: false

  - name: District-level educator CANNOT see class-assigned administration (no descendant access for educators)
    check:
      - user: user:district-teacher
        object: administration:admin-at-class
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false
          can_create: false
          can_update: false
          can_delete: false

  # ─── Caregiver permissions ─────────────────────────────────────────

  - name: Caregiver cannot list/read administrations (no org-level access)
    check:
      - user: user:class-guardian
        object: administration:admin-at-class
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false
          can_list_users: false
          can_read_scores: false
          can_read_progress: false
          can_create: false
          can_update: false
          can_delete: false
          can_create_run: false

  - name: Caregiver cannot see school-assigned administration
    check:
      - user: user:class-guardian
        object: administration:admin-at-school
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false
          can_read_scores: false
          can_delete: false

  - name: Caregiver cannot see district-assigned administration
    check:
      - user: user:class-guardian
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false
          can_read_scores: false
          can_delete: false

  # ─── Group member permissions ──────────────────────────────────────

  - name: Group member sees group-assigned administration
    check:
      - user: user:group-member
        object: administration:admin-at-group
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_create_run: true

          can_read_scores: false
          can_delete: false

  - name: Group teacher has supervisory access on group-assigned administration
    check:
      - user: user:group-teacher
        object: administration:admin-at-group
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create_run: false
          can_delete: false

  - name: Group admin has admin-tier access on group-assigned administration
    check:
      - user: user:group-admin
        object: administration:admin-at-group
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_delete: false
          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create_run: false

  - name: Group member does NOT see class-assigned administration
    check:
      - user: user:group-member
        object: administration:admin-at-class
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false

  - name: Group teacher cannot see district-assigned administration (group grants no org-level access)
    check:
      - user: user:group-teacher
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false
          can_list_users: false
          can_read_scores: false
          can_read_progress: false

  - name: Group teacher cannot see class-assigned administration (group grants no org-level access)
    check:
      - user: user:group-teacher
        object: administration:admin-at-class
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false
          can_list_users: false

  - name: Group admin cannot see district-assigned administration (group grants no org-level access)
    check:
      - user: user:group-admin
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false
          can_list_users: false
          can_delete: false

  # ─── Multi-entity administration ──────────────────────────────────

  - name: District admin sees multi-entity administration (via district assignment)
    check:
      - user: user:district-admin
        object: administration:admin-multi
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_read_scores: true

  - name: Class teacher sees multi-entity administration (via class assignment)
    check:
      - user: user:class-teacher
        object: administration:admin-multi
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_read_scores: true

  - name: Student sees multi-entity administration (via class assignment)
    check:
      - user: user:student-x
        object: administration:admin-multi
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_create_run: true

  - name: Admin in tree B cannot see multi-entity administration in tree A
    check:
      - user: user:admin-b
        object: administration:admin-multi
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false

  # ─── Cross-tree user permissions ──────────────────────────────────

  - name: Cross-tree user sees tree-A administration as student (not as tree-B teacher)
    check:
      - user: user:cross-tree-user
        object: administration:admin-at-class
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_create_run: true
          can_read_scores: false

  - name: Cross-tree user sees tree-B administration as teacher (not as tree-A student)
    check:
      - user: user:cross-tree-user
        object: administration:admin-in-b
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_read_scores: true
          can_create_run: false

  # ─── Admin-tier role spot-checks ───────────────────────────────────

  - name: System administrator sees district-assigned administration
    check:
      - user: user:sys-admin
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create: false
          can_update: false
          can_delete: false
          can_create_run: false

  - name: Site administrator sees class-assigned administration (descendant access)
    check:
      - user: user:site-admin
        object: administration:admin-at-class
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_list_users: true
          can_read_scores: true
          can_create: false
          can_update: false
          can_delete: false

  # ─── Non-teacher educator role spot-checks ───────────────────────

  - name: School counselor sees school-assigned administration
    check:
      - user: user:school-counselor
        object: administration:admin-at-school
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create: false
          can_update: false
          can_delete: false
          can_create_run: false

  - name: School counselor sees district-assigned administration (ancestor access via subtree)
    check:
      - user: user:school-counselor
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true

  - name: Class aide sees class-assigned administration
    check:
      - user: user:class-aide
        object: administration:admin-at-class
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create: false
          can_update: false
          can_delete: false
          can_create_run: false

  - name: Class aide sees district-assigned administration (ancestor access via subtree, two hops)
    check:
      - user: user:class-aide
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true

  - name: District proctor sees district-assigned administration
    check:
      - user: user:district-proctor
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_list_users: true
          can_read_scores: true
          can_read_progress: true
          can_create: false
          can_update: false
          can_delete: false
          can_create_run: false

  # ─── Administration assigned to school + group ────────────────────

  - name: School teacher sees school+group administration (via school assignment)
    check:
      - user: user:school-teacher
        object: administration:admin-school-and-group
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_read_scores: true

  - name: Group member sees school+group administration (via group assignment only)
    check:
      - user: user:group-member
        object: administration:admin-school-and-group
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: true
          can_read: true
          can_create_run: true
          can_read_scores: false

  - name: Admin in tree B cannot see school+group administration (wrong tree)
    check:
      - user: user:admin-b
        object: administration:admin-school-and-group
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false

  # ─── Cross-administration denial ───────────────────────────────────

  - name: Admin in tree A cannot see administrations in tree B
    check:
      - user: user:district-admin
        object: administration:admin-in-b
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false
          can_list_users: false
          can_create: false
          can_update: false
          can_delete: false

  - name: Student in tree A cannot see administrations in tree B
    check:
      - user: user:student-x
        object: administration:admin-in-b
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false
          can_create_run: false

  - name: Admin in tree B cannot see administrations in tree A
    check:
      - user: user:admin-b
        object: administration:admin-at-district
        context:
          current_time: "2025-06-15T12:00:00Z"
        assertions:
          can_list: false
          can_read: false

